apiVersion: apps/v1
kind: Deployment
metadata:
  name: arr-stack
  labels: { app: arr-stack }
spec:
  replicas: 1
  strategy: { type: Recreate }
  selector:
    matchLabels: { app: arr-stack }
  template:
    metadata:
      labels:
        app: arr-stack
        traffic-tier: bulk-seed
    spec:
      terminationGracePeriodSeconds: 180
      nodeSelector:
        kubernetes.io/hostname: eva-3
      tolerations:
        - key: homelab.rcrumana.xyz/storage
          operator: Equal
          value: "true"
          effect: NoSchedule
      dnsPolicy: None
      dnsConfig:
        nameservers:
          - 10.45.0.10
        options:
          - name: ndots
            value: "2"
      volumes:
        - name: dev-net-tun
          hostPath: { path: /dev/net/tun, type: CharDevice }
        - name: gluetun
          persistentVolumeClaim:
            claimName: arr-stack-gluetun
        - name: qbit-config
          persistentVolumeClaim:
            claimName: arr-stack-qbit-config
        - name: sonarr-config
          persistentVolumeClaim:
            claimName: arr-stack-sonarr-config
        - name: radarr-config
          persistentVolumeClaim:
            claimName: arr-stack-radarr-config
        - name: lidarr-config
          persistentVolumeClaim:
            claimName: arr-stack-lidarr-config
        - name: prowlarr-config
          persistentVolumeClaim:
            claimName: arr-stack-prowlarr-config
        - name: jellyseerr-config
          persistentVolumeClaim:
            claimName: arr-stack-jellyseerr-config
        - name: media
          persistentVolumeClaim:
            claimName: media-library-torrent-eva-3
        - name: temp
          hostPath: { path: /var/lib/qbit-temp, type: DirectoryOrCreate }
        - name: pf-state
          emptyDir: {}
        - name: pf-sync
          configMap:
            name: arr-stack-gluetun-pf-sync
            defaultMode: 0755

      initContainers:
        - name: sysctl-init
          image: harbor.rcrumana.xyz/proxy-dockerhub/library/busybox:1.38
          securityContext:
            privileged: true
          command: ["sh","-c",<<-'EOS'
            set -eux
            sysctl -w net.ipv4.conf.all.rp_filter=0
            sysctl -w net.ipv4.conf.default.rp_filter=0
            sysctl -w net.ipv4.conf.tun0.rp_filter=0 || true
            EOS]
        - name: fix-perms
          image: harbor.rcrumana.xyz/proxy-dockerhub/library/busybox:1.38
          securityContext:
            runAsUser: 0
            runAsGroup: 0
          command:
            - sh
            - -c
            - |
              set -eux
              echo "fix-perms: listing /config and /gluetun (if mounted)"
              ls -la /config 2>/dev/null || true
              find /config -maxdepth 2 -type f -print 2>/dev/null || true
              ls -la /temp 2>/dev/null || true
              if [ -f /config/qBittorrent/qBittorrent.conf ]; then
                echo "fix-perms: found /config/qBittorrent/qBittorrent.conf"
              else
                echo "fix-perms: qBittorrent.conf missing"
              fi
              if [ -f /gluetun/servers.json ] && [ ! -s /gluetun/servers.json ]; then
                echo "fix-perms: removing empty /gluetun/servers.json"
                rm -f /gluetun/servers.json
              fi
              mkdir -p /temp
              mkdir -p /seerr-config/logs
              chown -R 1000:1000 /config /gluetun /temp /seerr-config 2>/dev/null || true
              chmod -R u+rwX,g+rwX /config /gluetun /temp /seerr-config 2>/dev/null || true
          volumeMounts:
            - { name: qbit-config, mountPath: /config }
            - { name: gluetun,     mountPath: /gluetun }
            - { name: temp,        mountPath: /temp }
            - { name: jellyseerr-config, mountPath: /seerr-config }
        - name: install-vuetorrent
          image: harbor.rcrumana.xyz/mirror/linuxserver/qbittorrent:5.2.0
          securityContext:
            runAsUser: 0
            runAsGroup: 0
          command:
            - sh
            - -c
            - |
              set -eu
              version="v2.31.0"
              expected_sha256="ad213f4479a232ae27b410b082b622ac2d06661cab063c2d240fbd255083ddab"
              target="/config/vuetorrent-${version}"

              if [ -f "${target}/public/index.html" ]; then
                echo "install-vuetorrent: ${version} already installed"
                exit 0
              fi

              archive="/tmp/vuetorrent.zip"
              stage="/tmp/vuetorrent-stage"
              mkdir -p "$stage"
              curl -fL --retry 5 --retry-delay 2 \
                "https://github.com/VueTorrent/VueTorrent/releases/download/${version}/vuetorrent.zip" \
                -o "$archive"
              printf '%s  %s\n' "$expected_sha256" "$archive" | sha256sum -c -
              unzip -q "$archive" -d "$stage"
              test -f "$stage/vuetorrent/public/index.html"

              mkdir -p "$target"
              cp -a "$stage/vuetorrent/." "$target/"
              test -f "${target}/public/index.html"
              chown -R 1000:1000 "$target"
              echo "install-vuetorrent: installed ${version}"
          volumeMounts:
            - { name: qbit-config, mountPath: /config }

      containers:
        - name: gluetun
          image: harbor.rcrumana.xyz/mirror/qmcgaw/gluetun:v3.41.1
          securityContext:
            privileged: true
            capabilities: { add: ["NET_ADMIN"] }
          envFrom:
            - secretRef: { name: gluetun-env }
          env:
            - { name: FIREWALL_INPUT_PORTS, value: "8020,8989,7878,9696,8686,8191,5055" }
            - { name: HEALTH_TARGET_ADDRESS, value: "127.0.0.1:9999" }
            - { name: VPN_PORT_FORWARDING_STATUS_FILE, value: "/pf/state/forwarded_port" }
            - { name: FIREWALL_OUTBOUND_SUBNETS, value: "10.44.0.0/16,10.45.0.0/16" }
            - { name: BLOCK_IPV6, value: "on" }
          volumeMounts:
            - { name: dev-net-tun, mountPath: /dev/net/tun }
            - { name: gluetun, mountPath: /gluetun }
            - { name: pf-state, mountPath: /pf/state }
          resources:
            requests: { cpu: "200m", memory: "256Mi" }
            limits:   { cpu: "1", memory: "512Mi" }

        - name: pf-sync
          image: harbor.rcrumana.xyz/proxy-dockerhub/curlimages/curl:8.21.0
          imagePullPolicy: IfNotPresent
          command: ["/bin/sh","-c","/scripts/pf-sync.sh"]
          env:
            - { name: PF_FILE, value: "/pf/state/forwarded_port" }
            - { name: QB_WEBUI_PORT, value: "8020" }
            - { name: QB_GLOBAL_UPLOAD_SLOTS, value: "256" }
            - { name: QB_UPLOAD_SLOTS_PER_TORRENT, value: "8" }
            - { name: QB_DISK_IO_TYPE, value: "3" }
            - { name: QB_ASYNC_IO_THREADS, value: "3" }
            - { name: QB_HASHING_THREADS, value: "4" }
            - { name: QB_SEND_BUFFER_LOW_WATERMARK, value: "16384" }
            - { name: QB_SEND_BUFFER_WATERMARK, value: "131072" }
            - { name: QB_SEND_BUFFER_WATERMARK_FACTOR, value: "250" }
            - { name: QB_ALTERNATIVE_WEBUI_ENABLED, value: "true" }
            - { name: QB_ALTERNATIVE_WEBUI_PATH, value: "/config/vuetorrent-v2.31.0" }
            - { name: QB_USERNAME, valueFrom: { secretKeyRef: { name: qb-webui-creds, key: username } } }
            - { name: QB_PASSWORD, valueFrom: { secretKeyRef: { name: qb-webui-creds, key: password } } }
          volumeMounts:
            - { name: pf-sync, mountPath: /scripts/pf-sync.sh, subPath: pf-sync.sh }
            - { name: pf-state, mountPath: /pf/state }
          resources:
            requests: { cpu: "5m", memory: "16Mi" }
            limits:   { cpu: "25m", memory: "64Mi" }

        - name: qbittorrent
          image: harbor.rcrumana.xyz/mirror/linuxserver/qbittorrent:5.2.0
          env:
            - { name: PUID, value: "1000" }
            - { name: PGID, value: "1000" }
            - { name: TZ,   value: "America/Los_Angeles" }
            - { name: WEBUI_PORT, value: "8020" }
            - { name: TORRENTING_PORT, value: "6881" }
          ports:
            - { name: webui, containerPort: 8020, protocol: TCP }
          volumeMounts:
            - { name: qbit-config, mountPath: /config }
            - { name: media,       mountPath: /media }
            - { name: temp,        mountPath: /temp }
          resources:
            requests: { cpu: "300m", memory: "2Gi" }
            limits:   { cpu: "2", memory: "8Gi" }

        - name: sonarr
          image: harbor.rcrumana.xyz/mirror/linuxserver/sonarr:4.0.16.2944-ls298
          env:
            - { name: PUID, value: "1000" }
            - { name: PGID, value: "1000" }
            - { name: TZ,   value: "America/Los_Angeles" }
          volumeMounts:
            - { name: sonarr-config, mountPath: /config }
            - { name: media,         mountPath: /media }
          resources:
            requests: { cpu: "50m", memory: "256Mi" }
            limits:   { cpu: "2", memory: "2Gi" }

        - name: radarr
          image: harbor.rcrumana.xyz/mirror/linuxserver/radarr:6.0.4.10291-ls288
          env:
            - { name: PUID, value: "1000" }
            - { name: PGID, value: "1000" }
            - { name: TZ,   value: "America/Los_Angeles" }
          volumeMounts:
            - { name: radarr-config, mountPath: /config }
            - { name: media,         mountPath: /media }
          resources:
            requests: { cpu: "50m", memory: "256Mi" }
            limits:   { cpu: "2", memory: "2Gi" }

        - name: lidarr
          image: harbor.rcrumana.xyz/mirror/linuxserver/lidarr:3.1.0.4875-ls22
          env:
            - { name: PUID, value: "1000" }
            - { name: PGID, value: "1000" }
            - { name: TZ,   value: "America/Los_Angeles" }
          volumeMounts:
            - { name: lidarr-config, mountPath: /config }
            - { name: media,         mountPath: /media }
          resources:
            requests: { cpu: "50m", memory: "256Mi" }
            limits:   { cpu: "2", memory: "2Gi" }

        - name: prowlarr
          image: harbor.rcrumana.xyz/mirror/linuxserver/prowlarr:2.3.0.5236-ls139
          env:
            - { name: PUID, value: "1000" }
            - { name: PGID, value: "1000" }
            - { name: TZ,   value: "America/Los_Angeles" }
            - { name: DOTNET_SYSTEM_NET_DISABLEIPV6, value: "1" }
          volumeMounts:
            - { name: prowlarr-config, mountPath: /config }
          resources:
            requests: { cpu: "50m", memory: "256Mi" }
            limits:   { cpu: "2", memory: "2Gi" }

        - name: jellyseerr
          image: harbor.rcrumana.xyz/mirror/seerr-team/seerr:v3.1.0
          env:
            - { name: TZ,   value: "America/Los_Angeles" }
            - { name: DB_TYPE, value: "postgres" }
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: arr-postgres-config
                  key: JELLYSEERR_DB_HOST
            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: arr-postgres-config
                  key: JELLYSEERR_DB_PORT
            - name: DB_USER
              valueFrom:
                configMapKeyRef:
                  name: arr-postgres-config
                  key: JELLYSEERR_DB_USER
            - name: DB_PASS
              valueFrom:
                secretKeyRef:
                  name: arr-postgres-secret
                  key: JELLYSEERR_DB_PASS
            - name: DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: arr-postgres-config
                  key: JELLYSEERR_DB_NAME
          ports:
            - { name: http, containerPort: 5055, protocol: TCP }
          volumeMounts:
            - { name: jellyseerr-config, mountPath: /app/config }
          resources:
            requests: { cpu: "50m", memory: "256Mi" }
            limits:   { cpu: "2", memory: "2Gi" }

        - name: flaresolverr
          image: harbor.rcrumana.xyz/proxy-ghcr/flaresolverr/flaresolverr:v3.5.0
          env:
            - { name: LOG_LEVEL, value: "info" }
            - { name: LOG_HTML,  value: "false" }
            - { name: CAPTCHA_SOLVER, value: "none" }
            - { name: TZ,   value: "America/Los_Angeles" }
          resources:
            requests: { cpu: "50m", memory: "256Mi" }
            limits:   { cpu: "2", memory: "2Gi" }
