apiVersion: apps/v1
kind: Deployment
metadata:
  name: immich-machine-learning
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  labels:
    app: immich
    component: machine-learning
spec:
  replicas: 1
  progressDeadlineSeconds: 1800
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: immich
      component: machine-learning
  template:
    metadata:
      annotations:
        linkerd.io/inject: enabled
      labels:
        app: immich
        component: machine-learning
    spec:
      serviceAccountName: immich-machine-learning
      terminationGracePeriodSeconds: 120
      containers:
        - name: immich-machine-learning
          image: harbor.rcrumana.xyz/proxy-ghcr/immich-app/immich-machine-learning:v3.0.3
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3003
              name: http
          envFrom:
            - configMapRef:
                name: immich-config
            - secretRef:
                name: immich-secret
          env:
            - name: MACHINE_LEARNING_WORKER_TIMEOUT
              value: "300"
            - name: MACHINE_LEARNING_CACHE_FOLDER
              value: "/cache"
            - name: MACHINE_LEARNING_REQUEST_THREADS
              value: "1"
            - name: MACHINE_LEARNING_MODEL_INTRA_OP_THREADS
              value: "1"
            - name: MACHINE_LEARNING_WORKERS
              value: "1"
          volumeMounts:
            - name: model-cache
              mountPath: /cache
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "48Gi"
              cpu: "24"
      volumes:
        - name: model-cache
          persistentVolumeClaim:
            claimName: immich-ml-cache-critical
