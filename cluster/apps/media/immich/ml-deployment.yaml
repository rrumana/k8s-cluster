apiVersion: apps/v1
kind: Deployment
metadata:
  name: immich-machine-learning
  labels:
    app: immich
    component: machine-learning
spec:
  replicas: 1
  selector:
    matchLabels:
      app: immich
      component: machine-learning
  template:
    metadata:
      labels:
        app: immich
        component: machine-learning
    spec:
      containers:
        - name: immich-machine-learning
          image: ghcr.io/immich-app/immich-machine-learning:v2.5.6-rocm
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: immich-config
            - secretRef:
                name: immich-secret
          env:
            - name: HSA_OVERRIDE_GFX_VERSION
              value: "11.5.1"
          volumeMounts:
            - name: model-cache
              mountPath: /cache
            - name: dri
              mountPath: /dev/dri
            - name: kfd
              mountPath: /dev/kfd
          securityContext:
            privileged: true
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "4Gi"
              cpu: "24"
      volumes:
        - name: model-cache
          persistentVolumeClaim:
            claimName: immich-ml-cache
        - name: dri
          hostPath:
            path: /dev/dri
            type: Directory
        - name: kfd
          hostPath:
            path: /dev/kfd
            type: CharDevice
