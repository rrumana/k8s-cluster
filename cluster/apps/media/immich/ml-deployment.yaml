apiVersion: apps/v1
kind: Deployment
metadata:
  name: immich-machine-learning
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  labels:
    app: immich
    component: machine-learning
spec:
  replicas: 1
  progressDeadlineSeconds: 1800
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: immich
      component: machine-learning
  template:
    metadata:
      annotations:
        linkerd.io/inject: enabled
        storage-migration.rcrumana.xyz/script-version: "2"
      labels:
        app: immich
        component: machine-learning
    spec:
      serviceAccountName: immich-machine-learning
      terminationGracePeriodSeconds: 120
      initContainers:
        - name: migrate-ceph-block-storage
          image: docker.io/library/python:3.13-alpine@sha256:399babc8b49529dabfd9c922f2b5eea81d611e4512e3ed250d75bd2e7683f4b0
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - /scripts/migrate-storage.sh
          env:
            - name: MIGRATION_NAME
              value: immich-ml-cache
            - name: MIGRATION_RATE_MIB
              value: "24"
          securityContext:
            runAsUser: 0
            runAsGroup: 0
            runAsNonRoot: false
            allowPrivilegeEscalation: false
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: "1"
              memory: 512Mi
          volumeMounts:
            - name: migration-source
              mountPath: /source
              readOnly: true
            - name: model-cache
              mountPath: /target
            - name: migration-scripts
              mountPath: /scripts
              readOnly: true
      containers:
        - name: immich-machine-learning
          image: harbor.rcrumana.xyz/proxy-ghcr/immich-app/immich-machine-learning:v3.0.3
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3003
              name: http
          envFrom:
            - configMapRef:
                name: immich-config
            - secretRef:
                name: immich-secret
          env:
            - name: MACHINE_LEARNING_WORKER_TIMEOUT
              value: "300"
            - name: MACHINE_LEARNING_CACHE_FOLDER
              value: "/cache"
            - name: MACHINE_LEARNING_REQUEST_THREADS
              value: "1"
            - name: MACHINE_LEARNING_MODEL_INTRA_OP_THREADS
              value: "1"
            - name: MACHINE_LEARNING_WORKERS
              value: "1"
          volumeMounts:
            - name: model-cache
              mountPath: /cache
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "48Gi"
              cpu: "24"
      volumes:
        - name: migration-source
          persistentVolumeClaim:
            claimName: immich-ml-cache
            readOnly: true
        - name: model-cache
          persistentVolumeClaim:
            claimName: immich-ml-cache-critical
        - name: migration-scripts
          configMap:
            name: immich-storage-migration
            defaultMode: 0555
