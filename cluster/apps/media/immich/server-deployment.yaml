apiVersion: apps/v1
kind: Deployment
metadata:
  name: immich-server
  annotations:
    argocd.argoproj.io/sync-wave: "10"
  labels:
    app: immich
    component: server
spec:
  replicas: 1
  progressDeadlineSeconds: 86400
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: immich
      component: server
  template:
    metadata:
      annotations:
        linkerd.io/inject: enabled
        config.linkerd.io/skip-outbound-ports: "6379"
        storage-migration.rcrumana.xyz/script-version: "2"
      labels:
        app: immich
        component: server
    spec:
      serviceAccountName: immich-server
      terminationGracePeriodSeconds: 120
      initContainers:
        - name: migrate-ceph-block-storage
          image: docker.io/library/python:3.13-alpine@sha256:399babc8b49529dabfd9c922f2b5eea81d611e4512e3ed250d75bd2e7683f4b0
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - /scripts/migrate-storage.sh
          env:
            - name: MIGRATION_NAME
              value: immich-photos
            - name: MIGRATION_RATE_MIB
              value: "16"
          securityContext:
            runAsUser: 0
            runAsGroup: 0
            runAsNonRoot: false
            allowPrivilegeEscalation: false
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: "1"
              memory: 512Mi
          volumeMounts:
            - name: migration-source
              mountPath: /source
              readOnly: true
            - name: upload
              mountPath: /target
            - name: migration-scripts
              mountPath: /scripts
              readOnly: true
      containers:
        - name: immich-server
          image: harbor.rcrumana.xyz/proxy-ghcr/immich-app/immich-server:v3.0.3
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 2283
              name: http
          envFrom:
            - configMapRef:
                name: immich-config
            - secretRef:
                name: immich-secret
          volumeMounts:
            - name: upload
              mountPath: /usr/src/app/upload
            - name: dri
              mountPath: /dev/dri
            - name: localtime
              mountPath: /etc/localtime
              readOnly: true
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "48Gi"
              cpu: "24"
          livenessProbe:
            httpGet:
              path: /api/server/ping
              port: 2283
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /api/server/ping
              port: 2283
            initialDelaySeconds: 10
            periodSeconds: 10
      volumes:
        - name: migration-source
          persistentVolumeClaim:
            claimName: immich-photos
            readOnly: true
        - name: upload
          persistentVolumeClaim:
            claimName: immich-photos-critical
        - name: migration-scripts
          configMap:
            name: immich-storage-migration
            defaultMode: 0555
        - name: dri
          hostPath:
            path: /dev/dri
            type: Directory
        - name: localtime
          hostPath:
            path: /etc/localtime
            type: File
