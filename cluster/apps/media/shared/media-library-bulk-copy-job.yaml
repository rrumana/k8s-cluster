apiVersion: batch/v1
kind: Job
metadata:
  name: media-library-cephfs-bulk-seed-v6
  namespace: media
  annotations:
    argocd.argoproj.io/sync-wave: "10"
  labels:
    app.kubernetes.io/name: media-library
    app.kubernetes.io/component: storage-migration
spec:
  suspend: false
  # Never let a replacement rsync writer overlap a terminating predecessor on
  # the RWX target after an eviction or node failure.
  podReplacementPolicy: Failed
  backoffLimit: 20
  completions: 1
  parallelism: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: media-library
        app.kubernetes.io/component: storage-migration
    spec:
      automountServiceAccountToken: false
      restartPolicy: Never
      terminationGracePeriodSeconds: 120
      imagePullSecrets:
        - name: harbor-pull-creds
      securityContext:
        runAsUser: 0
        runAsGroup: 0
        runAsNonRoot: false
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: copy-and-verify
          # This exact digest is authenticated in Harbor and includes rsync
          # 3.2.5 with ACL and xattr support. Require Harbor healthy before
          # first launch; the image is not guaranteed to be node-cached.
          image: harbor.rcrumana.xyz/mirror/backube/volsync@sha256:644b261e35442a5320c2d295f4d84302839dc32ff6225a103ea512845042ff58
          imagePullPolicy: IfNotPresent
          command:
            - /usr/bin/bash
            - -c
            - |
              set -Eeuo pipefail

              readonly identity=/target/.cephfs-bulk-migration-target
              readonly state=/target/.cephfs-bulk-migration-state
              readonly success=/target/.cephfs-bulk-migration-seed-complete
              readonly expected_identity=media-library-bulk:v1
              readonly expected_phase=seed:v1
              readonly verification=/tmp/rsync-verification
              readonly inventory=/tmp/cephfs-bulk-inventory
              readonly file_list_prefix=/tmp/cephfs-bulk-files
              readonly stream_count=4
              readonly per_stream_bwlimit_kib=51200
              declare -a child_pids=()

              stop_copy() {
                printf 'interrupted_at=%s\n' "$(date --iso-8601=seconds)" > "${state}"
                for child_pid in "${child_pids[@]}"; do
                  kill -TERM "${child_pid}" 2>/dev/null || true
                done
                for child_pid in "${child_pids[@]}"; do
                  wait "${child_pid}" 2>/dev/null || true
                done
                exit 143
              }
              trap stop_copy TERM INT

              test -d /source
              test -d /target

              if [[ -f "${success}" ]]; then
                test -f "${identity}"
                test "$(cat "${identity}")" = "${expected_identity}"
                grep -Fxq "phase=${expected_phase}" "${success}"
                echo 'This seed phase already completed; refusing to replay it'
                cat "${success}"
                exit 0
              fi

              if [[ -f "${identity}" ]]; then
                test "$(cat "${identity}")" = "${expected_identity}"
              else
                if find /target -mindepth 1 -maxdepth 1 \
                    ! -name lost+found -print -quit | grep -q .; then
                  echo 'Refusing to initialize a nonempty, unidentified target' >&2
                  exit 42
                fi
                printf '%s\n' "${expected_identity}" > "${identity}"
              fi

              printf 'running_at=%s\n' "$(date --iso-8601=seconds)" > "${state}"

              # Assign every non-directory path to a deterministic bucket by
              # source filesystem device and inode. All names in a hard-link
              # group therefore remain in one rsync file list even when they
              # span Downloads, Shows, Movies, or Music. This avoids
              # duplicating several TiB of cross-library hard links while
              # still providing four balanced queues.
              find /source \
                -xdev \
                -mindepth 1 \
                ! -type d \
                ! -path '/source/.cephfs-bulk-migration-target' \
                ! -path '/source/.cephfs-bulk-migration-state' \
                ! -path '/source/.cephfs-bulk-migration-seed-complete' \
                ! -path '/source/.rsync-partial' \
                ! -path '/source/.rsync-partial/*' \
                -printf '%D\0%i\0%P\0' > "${inventory}"

              exec 3> "${file_list_prefix}.0"
              exec 4> "${file_list_prefix}.1"
              exec 5> "${file_list_prefix}.2"
              exec 6> "${file_list_prefix}.3"
              inventory_count=0
              while IFS= read -r -d '' device \
                  && IFS= read -r -d '' inode \
                  && IFS= read -r -d '' relative_path; do
                device_suffix=${device: -2}
                inode_suffix=${inode: -2}
                stream_index=$((
                  (10#${device_suffix} + 10#${inode_suffix}) % stream_count
                ))
                case "${stream_index}" in
                  0) printf '%s\0' "${relative_path}" >&3 ;;
                  1) printf '%s\0' "${relative_path}" >&4 ;;
                  2) printf '%s\0' "${relative_path}" >&5 ;;
                  3) printf '%s\0' "${relative_path}" >&6 ;;
                esac
                inventory_count=$((inventory_count + 1))
              done < "${inventory}"
              exec 3>&-
              exec 4>&-
              exec 5>&-
              exec 6>&-

              bucket_count=0
              for stream_index in $(seq 0 $((stream_count - 1))); do
                stream_count_actual=$(
                  tr -cd '\000' < "${file_list_prefix}.${stream_index}" | wc -c
                )
                bucket_count=$((bucket_count + stream_count_actual))
                printf 'stream=%s paths=%s bwlimit_kib=%s\n' \
                  "${stream_index}" "${stream_count_actual}" \
                  "${per_stream_bwlimit_kib}"
              done
              test "${bucket_count}" -eq "${inventory_count}"
              test "${inventory_count}" -gt 0

              # Create and metadata-seed the directory skeleton before the
              # workers begin. The final serial convergence restores directory
              # times after parallel file creation.
              rsync \
                --archive \
                --acls \
                --xattrs \
                --one-file-system \
                --numeric-ids \
                --exclude=/.rsync-partial/ \
                '--include=*/' \
                '--exclude=*' \
                /source/ /target/

              for stream_index in $(seq 0 $((stream_count - 1))); do
                rsync \
                  --archive \
                  --recursive \
                  --relative \
                  --hard-links \
                  --acls \
                  --xattrs \
                  --sparse \
                  --one-file-system \
                  --whole-file \
                  --no-inc-recursive \
                  --no-implied-dirs \
                  --numeric-ids \
                  --from0 \
                  --files-from="${file_list_prefix}.${stream_index}" \
                  --partial \
                  --partial-dir=.rsync-partial \
                  --bwlimit="${per_stream_bwlimit_kib}" \
                  --human-readable \
                  --info=flist1,progress2,stats2,name0 \
                  --exclude=/.rsync-partial/ \
                  /source/ /target/ &
                child_pids+=("$!")
              done

              copy_status=0
              for child_pid in "${child_pids[@]}"; do
                set +e
                wait "${child_pid}"
                child_status=$?
                set -e
                if (( child_status != 0 && copy_status == 0 )); then
                  copy_status=${child_status}
                fi
              done
              child_pids=()
              if (( copy_status != 0 )); then
                printf 'failed_status=%s at=%s\n' \
                  "${copy_status}" "$(date --iso-8601=seconds)" > "${state}"
                exit "${copy_status}"
              fi

              # Converge deletes, directory metadata, and anything that
              # changed while the parallel inventory was running. This pass
              # also provides a full-tree hard-link correctness boundary.
              printf 'converging_at=%s\n' "$(date --iso-8601=seconds)" > "${state}"
              rsync \
                --archive \
                --hard-links \
                --acls \
                --xattrs \
                --sparse \
                --one-file-system \
                --whole-file \
                --numeric-ids \
                --delete-delay \
                --partial \
                --partial-dir=.rsync-partial \
                --bwlimit=196608 \
                --human-readable \
                --info=flist1,progress2,stats2,name0 \
                --exclude=/.cephfs-bulk-migration-target \
                --exclude=/.cephfs-bulk-migration-state \
                --exclude=/.cephfs-bulk-migration-seed-complete \
                --exclude=/.rsync-partial/ \
                /source/ /target/ &
              child_pids=("$!")

              set +e
              wait "${child_pids[0]}"
              copy_status=$?
              set -e
              child_pids=()
              if (( copy_status != 0 )); then
                printf 'convergence_failed_status=%s at=%s\n' \
                  "${copy_status}" "$(date --iso-8601=seconds)" > "${state}"
                exit "${copy_status}"
              fi

              sync -f /target

              rsync \
                --archive \
                --hard-links \
                --acls \
                --xattrs \
                --sparse \
                --one-file-system \
                --numeric-ids \
                --delete \
                --dry-run \
                --itemize-changes \
                --omit-dir-times \
                --exclude=/.cephfs-bulk-migration-target \
                --exclude=/.cephfs-bulk-migration-state \
                --exclude=/.cephfs-bulk-migration-seed-complete \
                --exclude=/.rsync-partial/ \
                /source/ /target/ > "${verification}"
              if [[ -s "${verification}" ]]; then
                echo 'Metadata verification found differences:' >&2
                sed -n '1,200p' "${verification}" >&2
                exit 43
              fi

              success_tmp="${success}.tmp.$$"
              printf 'phase=%s\ncompleted_at=%s\nsource_bytes=%s\ntarget_bytes=%s\n' \
                "${expected_phase}" \
                "$(date --iso-8601=seconds)" \
                "$(du -sx --block-size=1 /source | awk '{print $1}')" \
                "$(du -sx --block-size=1 /target | awk '{print $1}')" \
                > "${success_tmp}"
              sync "${success_tmp}"
              mv "${success_tmp}" "${success}"
              printf 'completed_at=%s\n' "$(date --iso-8601=seconds)" > "${state}"
              sync -f /target
              cat "${success}"
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: "4"
              memory: 4Gi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
              # The media tree is owned by UID/GID 1000. These let rsync
              # preserve ownership and metadata while still dropping every
              # unrelated capability.
              add:
                - CHOWN
                - DAC_OVERRIDE
                - FOWNER
                - FSETID
            readOnlyRootFilesystem: true
          volumeMounts:
            - name: source
              mountPath: /source
              readOnly: true
            - name: target
              mountPath: /target
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: source
          persistentVolumeClaim:
            claimName: media-library
            readOnly: true
        - name: target
          persistentVolumeClaim:
            claimName: media-library-bulk
        - name: tmp
          emptyDir: {}
