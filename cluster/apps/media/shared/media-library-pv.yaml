apiVersion: v1
kind: PersistentVolume
metadata:
  name: cephfs-media-library
spec:
  accessModes:
    - ReadWriteMany
  capacity:
    storage: 7Ti
  claimRef:
    namespace: media
    name: media-library
  csi:
    driver: rook-ceph.cephfs.csi.ceph.com
    nodeStageSecretRef:
      name: rook-csi-cephfs-node
      namespace: rook-ceph
    volumeAttributes:
      clusterID: rook-ceph
      fsName: ceph-filesystem
      staticVolume: "true"
      rootPath: /volumes/bulk/media/e51b34bd-ab57-4678-bc00-5861411d64f5
    volumeHandle: cephfs-media-library
  persistentVolumeReclaimPolicy: Retain
  storageClassName: ""
  volumeMode: Filesystem
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: media-library
  namespace: media
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 7Ti
  storageClassName: ""
  volumeMode: Filesystem
  volumeName: cephfs-media-library
