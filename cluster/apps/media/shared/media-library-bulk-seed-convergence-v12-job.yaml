# INERT FALLBACK: do not add this file to kustomization unless the v11 seed has
# exited 43 after completing its convergence pass solely because reserved
# target .rsync-partial directories remain. The old Job and pod must be absent
# before this suspended replacement is reconciled. Flip suspend to false only
# in a later activation commit after proving it is the sole target writer.
apiVersion: batch/v1
kind: Job
metadata:
  name: media-library-cephfs-bulk-seed-convergence-v12
  namespace: media
  annotations:
    argocd.argoproj.io/sync-wave: "10"
  labels:
    app.kubernetes.io/name: media-library
    app.kubernetes.io/component: storage-migration
    app.kubernetes.io/part-of: media-shared
spec:
  suspend: true
  # Never overlap a terminating rsync writer with a replacement pod after an
  # eviction or node failure.
  podReplacementPolicy: Failed
  backoffLimit: 3
  completions: 1
  parallelism: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: media-library
        app.kubernetes.io/component: storage-migration
        app.kubernetes.io/part-of: media-shared
    spec:
      automountServiceAccountToken: false
      restartPolicy: Never
      terminationGracePeriodSeconds: 120
      imagePullSecrets:
        - name: harbor-pull-creds
      securityContext:
        runAsUser: 0
        runAsGroup: 0
        runAsNonRoot: false
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: converge-and-verify
          # Authenticated in Harbor; rsync 3.2.5 has ACL/xattr support.
          image: harbor.rcrumana.xyz/mirror/backube/volsync@sha256:644b261e35442a5320c2d295f4d84302839dc32ff6225a103ea512845042ff58
          imagePullPolicy: IfNotPresent
          command:
            - /usr/bin/bash
            - -c
            - |
              set -Eeuo pipefail

              readonly identity=/target/.cephfs-bulk-migration-target
              readonly state=/target/.cephfs-bulk-migration-state
              readonly success=/target/.cephfs-bulk-migration-seed-complete
              readonly expected_identity=media-library-bulk:v1
              readonly expected_phase=seed:v1
              readonly verification=/tmp/rsync-verification
              readonly partial_parents=/tmp/rsync-partial-parents
              readonly bwlimit_kib=98304
              child_pid=""

              stop_copy() {
                printf 'seed_convergence_v12_interrupted_at=%s\n' \
                  "$(date --iso-8601=seconds)" > "${state}"
                if [[ -n "${child_pid}" ]]; then
                  kill -TERM "${child_pid}" 2>/dev/null || true
                  wait "${child_pid}" 2>/dev/null || true
                fi
                exit 143
              }
              trap stop_copy TERM INT

              require_no_source_partials() {
                local source_partial
                source_partial=$(find /source -xdev -type d \
                  -name .rsync-partial -print -quit)
                if [[ -n "${source_partial}" ]]; then
                  echo 'Refusing to treat a source .rsync-partial directory as a migration artifact:' >&2
                  printf '%s\n' "${source_partial}" >&2
                  exit 45
                fi
              }

              remove_target_partials() {
                : > "${partial_parents}"
                find /target -xdev -type d -name .rsync-partial -prune \
                  -printf '%h\0' > "${partial_parents}"

                # The exact target identity and the twice-checked absence of
                # source partial directories make only these exact-name target
                # directories reserved rsync artifacts. Do not remove their
                # parents or any other target path here.
                find /target -xdev -type d -name .rsync-partial -prune \
                  -exec rm -rf -- {} +

                # Deleting a child changes its parent's mtime. Restore that
                # one piece of directory metadata from the authoritative
                # source so the following dry run can be exact.
                while IFS= read -r -d '' target_parent; do
                  relative_parent=${target_parent#/target}
                  source_parent="/source${relative_parent}"
                  if [[ -d "${source_parent}" && -d "${target_parent}" ]]; then
                    touch --no-dereference --reference="${source_parent}" \
                      -- "${target_parent}"
                  fi
                done < "${partial_parents}"

                if [[ -n "$(find /target -xdev -type d \
                    -name .rsync-partial -print -quit)" ]]; then
                  echo 'Failed to remove one or more reserved target partial directories' >&2
                  exit 44
                fi
              }

              test -d /source
              test -d /target
              test -f "${identity}"
              test "$(cat "${identity}")" = "${expected_identity}"

              # A present marker is an unconditional replay barrier. A valid
              # marker is a successful no-op; a malformed marker fails closed.
              if [[ -e "${success}" || -L "${success}" ]]; then
                if [[ ! -f "${success}" ]] \
                    || ! grep -Fxq "phase=${expected_phase}" "${success}"; then
                  echo 'Seed marker exists but is invalid; refusing to replay' >&2
                  exit 46
                fi
                echo 'The seed phase is already complete; refusing to replay it'
                cat "${success}"
                exit 0
              fi

              require_no_source_partials
              # Remove stale v11 staging directories before convergence so
              # target-only parents they protected can be deleted by rsync.
              remove_target_partials
              printf 'seed_convergence_v12_running_at=%s\n' \
                "$(date --iso-8601=seconds)" > "${state}"

              # One bounded serial pass converges content, hard-link topology,
              # deletes, and metadata. Delta transfer avoids retransmitting a
              # complete large target file while the cluster is space-tight.
              rsync \
                --archive \
                --hard-links \
                --acls \
                --xattrs \
                --sparse \
                --one-file-system \
                --no-whole-file \
                --no-inc-recursive \
                --numeric-ids \
                --delete-delay \
                --partial \
                --partial-dir=.rsync-partial \
                --bwlimit="${bwlimit_kib}" \
                --human-readable \
                --info=flist1,progress2,stats2,name0 \
                --exclude=/.cephfs-bulk-migration-target \
                --exclude=/.cephfs-bulk-migration-state \
                --exclude=/.cephfs-bulk-migration-seed-complete \
                --exclude=.rsync-partial/ \
                /source/ /target/ &
              child_pid=$!

              set +e
              wait "${child_pid}"
              copy_status=$?
              set -e
              child_pid=""
              if (( copy_status != 0 )); then
                printf 'seed_convergence_v12_failed_status=%s at=%s\n' \
                  "${copy_status}" "$(date --iso-8601=seconds)" > "${state}"
                exit "${copy_status}"
              fi

              # Recheck the source before classifying any target name as an
              # rsync artifact; this closes the race with an online writer.
              require_no_source_partials
              remove_target_partials
              sync -f /target

              # Do not exclude .rsync-partial here. An empty itemized dry run
              # proves there are no rsync-visible namespace, hard-link,
              # quick-check, ACL, xattr, ownership, mode, mtime, or deletion
              # differences. This is the established metadata/tree boundary,
              # not an additional 5 TiB checksum reread.
              rsync \
                --archive \
                --hard-links \
                --acls \
                --xattrs \
                --sparse \
                --one-file-system \
                --numeric-ids \
                --delete \
                --dry-run \
                --itemize-changes \
                --exclude=/.cephfs-bulk-migration-target \
                --exclude=/.cephfs-bulk-migration-state \
                --exclude=/.cephfs-bulk-migration-seed-complete \
                /source/ /target/ > "${verification}"
              if [[ -s "${verification}" ]]; then
                echo 'Exact seed convergence verification found differences:' >&2
                sed -n '1,200p' "${verification}" >&2
                printf 'seed_convergence_v12_verification_failed_at=%s\n' \
                  "$(date --iso-8601=seconds)" > "${state}"
                exit 43
              fi

              success_tmp="${success}.tmp.$$"
              printf 'phase=%s\ncompleted_at=%s\nsource_bytes=%s\ntarget_bytes=%s\n' \
                "${expected_phase}" \
                "$(date --iso-8601=seconds)" \
                "$(du -sx --block-size=1 /source | awk '{print $1}')" \
                "$(du -sx --block-size=1 /target | awk '{print $1}')" \
                > "${success_tmp}"
              sync "${success_tmp}"
              # A hard-link create is atomic and fails rather than replacing a
              # marker that unexpectedly appeared after the replay check.
              if ! ln -- "${success_tmp}" "${success}"; then
                rm -f -- "${success_tmp}"
                echo 'Seed marker appeared concurrently; refusing to replace it' >&2
                exit 47
              fi
              rm -f -- "${success_tmp}"
              printf 'seed_convergence_v12_completed_at=%s\n' \
                "$(date --iso-8601=seconds)" > "${state}"
              sync -f /target
              cat "${success}"
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "4"
              memory: 4Gi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
              add:
                - CHOWN
                - DAC_OVERRIDE
                - FOWNER
                - FSETID
            readOnlyRootFilesystem: true
          volumeMounts:
            - name: source
              mountPath: /source
              readOnly: true
            - name: target
              mountPath: /target
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: source
          persistentVolumeClaim:
            claimName: media-library
            readOnly: true
        - name: target
          persistentVolumeClaim:
            claimName: media-library-bulk
        - name: tmp
          emptyDir: {}
      # This replacement is a new migration phase, so make its placement
      # explicit. The storage pool avoids another 2.5 Gb control-to-storage
      # client hop; the 96 MiB/s cap bounds competition with local OSD traffic.
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: homelab.rcrumana.xyz/node-plane
                    operator: In
                    values:
                      - storage
      tolerations:
        - key: homelab.rcrumana.xyz/storage
          operator: Equal
          value: "true"
          effect: NoSchedule
