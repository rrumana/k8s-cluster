apiVersion: apps/v1
kind: Deployment
metadata:
  name: jellyfin
  labels:
    app: jellyfin
spec:
  replicas: 0
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: jellyfin
  template:
    metadata:
      labels:
        app: jellyfin
    spec:
      dnsPolicy: ClusterFirstWithHostNet
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app: plex
              topologyKey: kubernetes.io/hostname
      securityContext:
        supplementalGroups:
          - 989
          - 985
      containers:
        - name: jellyfin
          image: harbor.rcrumana.xyz/mirror/linuxserver/jellyfin:10.11.3ubu2404-ls9
          securityContext:
            privileged: true
          env:
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
            - name: TZ
              value: "America/Los_Angeles"
            - name: JELLYFIN_PublishedServerUrl
              value: "https://jellyfin.k8s.rcrumana.xyz"
            - name: LIBVA_DRIVER_NAME
              value: radeonsi
          ports:
            - name: http
              containerPort: 8096
              protocol: TCP
            - name: https
              containerPort: 8920
              protocol: TCP
            - name: discovery
              containerPort: 7359
              protocol: UDP
            - name: dlna
              containerPort: 1900
              protocol: UDP
          volumeMounts:
            - name: config
              mountPath: /config
            - name: cache
              mountPath: /cache
            - name: media-library
              mountPath: /tv
              subPath: Torrent/Shows
            - name: media-library
              mountPath: /movies
              subPath: Torrent/Movies
            - name: media-library
              mountPath: /music
              subPath: Torrent/Music
            - name: dri
              mountPath: /dev/dri
          resources:
            requests:
              memory: "4Gi"
              cpu: "500m"
            limits:
              memory: "12Gi"
              cpu: "24"
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: jellyfin-config
        - name: cache
          emptyDir: {}
        - name: media-library
          persistentVolumeClaim:
            claimName: media-library
        - name: dri
          hostPath:
            path: /dev/dri
            type: Directory
