apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: plex-config
  annotations:
    argocd.argoproj.io/sync-wave: "-20"
spec:
  storageClassName: ceph-block
  accessModes: [ "ReadWriteOnce" ]
  resources:
    requests:
      storage: 128Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: plex-config-critical
  annotations:
    argocd.argoproj.io/sync-wave: "-20"
spec:
  storageClassName: ceph-block-critical
  accessModes: [ "ReadWriteOnce" ]
  resources:
    requests:
      storage: 128Gi
