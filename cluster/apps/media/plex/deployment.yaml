apiVersion: apps/v1
kind: Deployment
metadata:
  name: plex
  labels:
    app: plex
spec:
  replicas: 0
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: plex
  template:
    metadata:
      labels:
        app: plex
    spec:
      dnsPolicy: ClusterFirstWithHostNet
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app: jellyfin
              topologyKey: kubernetes.io/hostname
      containers:
        - name: plex
          image: harbor.rcrumana.xyz/mirror/linuxserver/plex:1.42.2.10156-f737b826c-ls287
          env:
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
            - name: TZ
              value: "America/Los_Angeles"
            - name: VERSION
              value: "docker"
            - name: ADVERTISE_IP
              value: "http://plex.k8s.rcrumana.xyz:32400/"
          ports:
            - name: web
              containerPort: 32400
              protocol: TCP
          volumeMounts:
            - name: config
              mountPath: /config
            - name: media-library
              mountPath: /tv
              subPath: Torrent/Shows
            - name: media-library
              mountPath: /movies
              subPath: Torrent/Movies
            - name: media-library
              mountPath: /music
              subPath: Torrent/Music
            - name: dri
              mountPath: /dev/dri
          resources:
            requests:
              memory: "512Mi"
              cpu: "500m"
            limits:
              memory: "8Gi"
              cpu: "24"
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: plex-config
        - name: media-library
          persistentVolumeClaim:
            claimName: media-library
        - name: dri
          hostPath:
            path: /dev/dri
            type: Directory
