apiVersion: apps/v1
kind: Deployment
metadata:
  name: vaultwarden
  labels:
    app: vaultwarden
spec:
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: vaultwarden
  template:
    metadata:
      annotations:
        linkerd.io/inject: enabled
      labels:
        app: vaultwarden
    spec:
      serviceAccountName: vaultwarden
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      initContainers:
      - name: migrate-storage
        image: alpine:3.24
        command:
        - sh
        - -c
        - >-
          set -eu;
          find /target -mindepth 1 -maxdepth 1 ! -name lost+found -exec rm -rf -- {} +;
          cp -a /source/. /target/;
          sync;
          du -sk /source /target
        securityContext:
          runAsUser: 0
          runAsGroup: 0
        volumeMounts:
        - name: migration-source
          mountPath: /source
          readOnly: true
        - name: data
          mountPath: /target
      containers:
      - name: vaultwarden
        image: harbor.rcrumana.xyz/proxy-dockerhub/vaultwarden/server:1.36.0
        ports:
        - containerPort: 80
          name: http
        env:
        - name: DOMAIN
          value: "https://vault.k8s.rcrumana.xyz"
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: vaultwarden-db-shared
              key: DATABASE_URL
        volumeMounts:
        - name: data
          mountPath: /data
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
          capabilities:
            drop:
            - ALL
      volumes:
      - name: migration-source
        persistentVolumeClaim:
          claimName: vaultwarden-data
      - name: data
        persistentVolumeClaim:
          claimName: vaultwarden-data-critical
