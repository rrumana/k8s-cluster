apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: uptime-kuma-data
  annotations:
    argocd.argoproj.io/sync-wave: "-20"
spec:
  storageClassName: ceph-block
  accessModes: [ "ReadWriteOnce" ]
  resources:
    requests:
      storage: 2Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: uptime-kuma-data-critical
  annotations:
    argocd.argoproj.io/sync-wave: "-20"
spec:
  storageClassName: ceph-block-critical
  accessModes: [ "ReadWriteOnce" ]
  resources:
    requests:
      storage: 2Gi
