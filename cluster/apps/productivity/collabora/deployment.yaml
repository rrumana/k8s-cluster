apiVersion: apps/v1
kind: Deployment
metadata:
  name: collabora
  labels: { app: collabora }
spec:
  replicas: 1
  selector:
    matchLabels: { app: collabora }
  template:
    metadata:
      annotations:
        linkerd.io/inject: enabled
      labels: { app: collabora }
    spec:
      serviceAccountName: collabora
      containers:
        - name: collabora
          image: harbor.rcrumana.xyz/proxy-dockerhub/collabora/code:25.04.9.4.1
          imagePullPolicy: IfNotPresent
          env:
            - name: domain
              value: "nextcloud\\.rcrumana\\.xyz"
            - name: extra_params
              value: "--o:ssl.enable=false --o:ssl.termination=true --o:server_name=collabora.rcrumana.xyz"
          ports:
            - name: http
              containerPort: 9980
          readinessProbe:
            tcpSocket: { port: 9980 }
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            tcpSocket: { port: 9980 }
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests: { cpu: 200m, memory: 1Gi }
            limits:   { cpu: "2", memory: 3Gi }
