apiVersion: apps/v1
kind: Deployment
metadata:
  name: homepage
  labels:
    app: homepage
spec:
  replicas: 3
  revisionHistoryLimit: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  selector:
    matchLabels:
      app: homepage
  template:
    metadata:
      annotations:
        homepage.rcrumana.xyz/config-revision: "2026-07-11-dashboard-alignment-cache-fix"
        linkerd.io/inject: enabled
      labels:
        app: homepage
    spec:
      serviceAccountName: homepage
      automountServiceAccountToken: true
      securityContext:
        fsGroup: 1000
        runAsGroup: 1000
        runAsUser: 1000
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app: homepage
              topologyKey: kubernetes.io/hostname
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: homepage
                topologyKey: kubernetes.io/hostname
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: homepage
      containers:
        - name: homepage
          image: harbor.rcrumana.xyz/proxy-ghcr/gethomepage/homepage:v1.13.2
          imagePullPolicy: IfNotPresent
          envFrom:
            - secretRef:
                name: homepage-env
                optional: true
            - secretRef:
                name: homepage-qbit-env
                optional: true
          env:
            - name: HOMEPAGE_VAR_NEXTCLOUD_USERNAME
              valueFrom:
                secretKeyRef:
                  name: nextcloud-admin
                  key: nextcloud-username
            - name: HOMEPAGE_VAR_NEXTCLOUD_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: nextcloud-admin
                  key: nextcloud-password
            - name: TZ
              value: America/Los_Angeles
            - name: LOG_LEVEL
              value: info
            - name: MY_POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: HOMEPAGE_ALLOWED_HOSTS
              value: $(MY_POD_IP):3000,dash.rcrumana.xyz,homepage.productivity.svc.cluster.local,homepage.productivity.svc.cluster.local:3000
          ports:
            - name: http
              containerPort: 3000
          readinessProbe:
            httpGet:
              path: /api/healthcheck
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /api/healthcheck
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            runAsNonRoot: true
            seccompProfile:
              type: RuntimeDefault
          lifecycle:
            postStart:
              exec:
                command:
                  - /bin/sh
                  - -c
                  - |
                    node -e '
                      let attempts = 0;
                      const revalidate = () => fetch("http://127.0.0.1:3000/api/revalidate", {
                        headers: { Host: "dash.rcrumana.xyz" }
                      }).then((response) => {
                        if (!response.ok) throw new Error(`HTTP ${response.status}`);
                      }).catch((error) => {
                        attempts += 1;
                        if (attempts >= 30) {
                          console.error(`Homepage revalidation failed: ${error.message}`);
                          process.exit(1);
                        }
                        setTimeout(revalidate, 1000);
                      });
                      revalidate();
                    '
          volumeMounts:
            - name: homepage-config
              mountPath: /app/config/kubernetes.yaml
              subPath: kubernetes.yaml
              readOnly: true
            - name: homepage-config
              mountPath: /app/config/proxmox.yaml
              subPath: proxmox.yaml
              readOnly: true
            - name: homepage-config
              mountPath: /app/config/settings.yaml
              subPath: settings.yaml
              readOnly: true
            - name: homepage-config
              mountPath: /app/config/services.yaml
              subPath: services.yaml
              readOnly: true
            - name: homepage-config
              mountPath: /app/config/bookmarks.yaml
              subPath: bookmarks.yaml
              readOnly: true
            - name: homepage-config
              mountPath: /app/config/widgets.yaml
              subPath: widgets.yaml
              readOnly: true
            - name: homepage-config
              mountPath: /app/config/docker.yaml
              subPath: docker.yaml
              readOnly: true
            - name: homepage-config
              mountPath: /app/config/custom.css
              subPath: custom.css
              readOnly: true
            - name: homepage-config
              mountPath: /app/config/custom.js
              subPath: custom.js
              readOnly: true
            - name: logs
              mountPath: /app/config/logs
            - name: cache
              mountPath: /app/.next/cache
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: homepage-config
          configMap:
            name: homepage-config
        - name: logs
          emptyDir: {}
        - name: cache
          emptyDir: {}
        - name: tmp
          emptyDir: {}
