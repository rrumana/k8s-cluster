                - label: RAM
                  query: 'node_memory_working_set_bytes{node="eva-3"} / on(node) kube_node_status_capacity{node="eva-3",resource="memory",unit="byte"}'
                  format:
                    type: percent
                    scale: 100
                    options:
                      maximumFractionDigits: 0
                - label: Temp
                  query: 'max(node_hwmon_temp_celsius{instance="192.168.1.18:9100",chip=~"pci.*18_3"})'
                  format:
                    type: number
                    suffix: " °C"
                    options:
                      maximumFractionDigits: 0
    - Cluster:
        - Argo CD:
            icon: argo-cd.png
            href: https://argocd.rcrumana.xyz
            description: GitOps control plane
            namespace: argocd
            app: argocd-server
            widget:
              type: argocd
              url: http://argocd-server.argocd.svc.cluster.local
              key: "{{HOMEPAGE_VAR_ARGOCD_TOKEN}}"
              fields: ["apps", "synced", "healthy"]
              hideErrors: true
        - Grafana:
            icon: grafana.png
            href: https://grafana.rcrumana.xyz
            description: Metrics and log dashboards
            namespace: monitoring
            app: grafana
            widget:
              type: grafana
              version: 2
              alerts: alertmanager
              url: http://kube-prometheus-stack-grafana.monitoring.svc.cluster.local
              username: "{{HOMEPAGE_VAR_GRAFANA_USERNAME}}"
              password: "{{HOMEPAGE_VAR_GRAFANA_PASSWORD}}"
              fields: ["dashboards", "datasources", "totalalerts", "alertstriggered"]
              hideErrors: true
        - Uptime Kuma:
            icon: uptime-kuma.png
            href: https://uptime.rcrumana.xyz
            description: Service uptime checks
            namespace: productivity
            app: uptime-kuma
            widget:
              type: uptimekuma
              url: http://uptime-kuma.productivity.svc.cluster.local
              slug: "{{HOMEPAGE_VAR_UPTIME_KUMA_SLUG}}"
              fields: ["up", "down", "uptime", "incident"]
              hideErrors: true
        - Harbor:
            icon: harbor.png
            href: https://harbor.rcrumana.xyz
            description: Container registry
            namespace: harbor
            podSelector: app=harbor

    - Portfolio:
        - Portfolio:
            icon: mdi-web
            href: https://rcrumana.xyz
            description: Public portfolio
            namespace: web
            app: portfolio
        - Portfolio Staging:
            icon: mdi-web
            href: https://staging.rcrumana.xyz
            description: Staging portfolio
            namespace: web
            app: portfolio-staging

  bookmarks.yaml: ""
  widgets.yaml: ""
  docker.yaml: ""
  custom.css: ""
  custom.js: ""
