                    type: percent
                    scale: 100
                    options:
                      maximumFractionDigits: 0
                - label: CPU
                  query: 'rate(node_cpu_usage_seconds_total{node="eva-3"}[2m]) / on(node) kube_node_status_capacity{node="eva-3",resource="cpu",unit="core"}'
                  format:
                    type: percent
