apiVersion: v1
kind: ConfigMap
metadata:
  name: homepage-config
data:
  kubernetes.yaml: |
    mode: cluster
    ingress: true
    gateway: true
  proxmox.yaml: ""
  settings.yaml: |
    title: Rcrumana Cluster
    language: en
    target: _blank
    statusStyle: dot
    layout:
      Nodes:
        style: row
        columns: 3
      Graphs:
        style: row
        columns: 1
      Cluster:
        style: row
        columns: 3
      Networking:
        style: row
        columns: 3
      Storage:
        style: row
        columns: 4
      Productivity:
        style: row
        columns: 4
      Media:
        style: row
        columns: 4
      AI and Web:
        style: row
        columns: 3
      Hosts:
        style: row
        columns: 4
  services.yaml: |
    - Cluster:
        - Argo CD:
            icon: argo-cd.png
            href: https://argocd.rcrumana.xyz
            description: GitOps control plane
            namespace: argocd
            app: argocd-server
        - Grafana:
            icon: grafana.png
            href: https://grafana.rcrumana.xyz
            description: Metrics and log dashboards
            namespace: monitoring
            app: grafana
        - Uptime Kuma:
            icon: uptime-kuma.png
            href: https://uptime.rcrumana.xyz
            description: External and service uptime checks
            namespace: productivity
            app: uptime-kuma

    - Networking:
        - OPNsense:
            icon: opnsense.png
            href: https://router.rcrumana.xyz
            description: Router and firewall
        - UniFi:
            icon: unifi.png
            href: https://unifi.rcrumana.xyz
            description: Network controller
            namespace: productivity
            app: unifi-os-server
        - Headscale:
            icon: headscale.png
            href: https://headscale.rcrumana.xyz/web
            description: Tailnet admin UI
            namespace: other
            app: headscale

    - Storage:
        - Ceph:
            icon: ceph.png
            href: https://ceph.rcrumana.xyz
            description: Ceph storage dashboard
            namespace: rook-ceph
            app: ceph-mgr
        - Media NAS:
            icon: truenas.png
            href: https://nas-2.rcrumana.xyz
            description: Primary NAS
        - Backups NAS:
            icon: truenas.png
            href: https://nas.rcrumana.xyz
            description: NAS for backups
        - MinIO:
            icon: minio.png
            href: https://minio.rcrumana.xyz
            description: Object storage console

    - Productivity:
        - Nextcloud:
            icon: nextcloud.png
            href: https://nextcloud.rcrumana.xyz
            description: Files and collaboration
            namespace: productivity
            app: nextcloud
        - Vaultwarden:
            icon: vaultwarden.png
            href: https://vault.rcrumana.xyz
            description: Password vault
            namespace: productivity
            app: vaultwarden
        - Whiteboard:
            icon: excalidraw.png
            href: https://whiteboard.rcrumana.xyz
            description: Shared whiteboard
            namespace: productivity
            app: whiteboard
        - Collabora:
            icon: collabora-online.png
            href: https://collabora.rcrumana.xyz
            description: Office document backend
            namespace: productivity
            app: collabora

    - Media:
        - Plex:
            icon: plex.png
            href: https://plex.rcrumana.xyz
            description: Media server
            namespace: media
            app: plex
        - Jellyfin:
            icon: jellyfin.png
            href: https://jellyfin.rcrumana.xyz
            description: Media server
            namespace: media
            app: jellyfin
        - Immich:
            icon: immich.png
            href: https://immich.rcrumana.xyz
            description: Photo library
            namespace: media
            app: immich
        - Jellyseerr:
            icon: jellyseerr.png
            href: https://jellyseerr.rcrumana.xyz
            description: Media requests
            namespace: media
            podSelector: app=arr-stack
        - Sonarr:
            icon: sonarr.png
            href: https://sonarr.rcrumana.xyz
            description: Series automation
            namespace: media
            podSelector: app=arr-stack
        - Radarr:
            icon: radarr.png
            href: https://radarr.rcrumana.xyz
            description: Movie automation
            namespace: media
            podSelector: app=arr-stack
        - Lidarr:
            icon: lidarr.png
            href: https://lidarr.rcrumana.xyz
            description: Music automation
            namespace: media
            podSelector: app=arr-stack
        - Prowlarr:
            icon: prowlarr.png
            href: https://prowlarr.rcrumana.xyz
            description: Indexer management
            namespace: media
            podSelector: app=arr-stack
        - qBittorrent:
            icon: qbittorrent.png
            href: https://qbit.rcrumana.xyz
            description: Primary torrent client
            namespace: media
            podSelector: app=arr-stack
        - qBittorrent LTS:
            icon: qbittorrent.png
            href: https://qbit-lts.rcrumana.xyz
            description: LTS torrent client
            namespace: media
            app: arr-lts
        - qBittorrent LTS 2:
            icon: qbittorrent.png
            href: https://qbit-lts2.rcrumana.xyz
            description: Secondary LTS torrent client
            namespace: media
            app: arr-lts2

    - AI and Web:
        - LibreChat:
            icon: librechat.png
            href: https://chat.rcrumana.xyz
            description: AI chat frontend
            namespace: ai
            app: librechat
        - Portfolio:
            icon: mdi-web
            href: https://rcrumana.xyz
            description: Public portfolio
            namespace: web
            app: portfolio
        - Portfolio Staging:
            icon: mdi-web
            href: https://staging.rcrumana.xyz
            description: Staging portfolio
            namespace: web
            app: portfolio-staging

    - Nodes:
        - Melchior:
            icon: mdi-server
            href: https://melchior.rcrumana.xyz
            description: 192.168.1.13
            widget:
              type: prometheusmetric
              url: http://kube-prometheus-stack-prometheus.monitoring.svc.cluster.local:9090
              refreshInterval: 1000
              metrics:
                - label: CPU
                  query: 100 * sum(rate(node_cpu_seconds_total{instance="192.168.1.13:9100",mode=~"user|system|nice|irq|softirq|steal"}[1m])) / count(node_cpu_seconds_total{instance="192.168.1.13:9100",mode="idle"})
                  format:
                    type: percent
                    options:
                      maximumFractionDigits: 1
                - label: RAM
                  query: 100 * (1 - node_memory_MemAvailable_bytes{instance="192.168.1.13:9100"} / node_memory_MemTotal_bytes{instance="192.168.1.13:9100"})
                  format:
                    type: percent
                    options:
                      maximumFractionDigits: 1
                - label: Used
                  query: node_memory_MemTotal_bytes{instance="192.168.1.13:9100"} - node_memory_MemAvailable_bytes{instance="192.168.1.13:9100"}
                  format:
                    type: bytes
                    options:
                      maximumFractionDigits: 1
                - label: Load
                  query: node_load1{instance="192.168.1.13:9100"}
                  format:
                    type: number
                    options:
                      maximumFractionDigits: 2
        - Balthasar:
            icon: mdi-server
            href: https://balthasar.rcrumana.xyz
            description: 192.168.1.14
            widget:
              type: prometheusmetric
              url: http://kube-prometheus-stack-prometheus.monitoring.svc.cluster.local:9090
              refreshInterval: 1000
              metrics:
                - label: CPU
                  query: 100 * sum(rate(node_cpu_seconds_total{instance="192.168.1.14:9100",mode=~"user|system|nice|irq|softirq|steal"}[1m])) / count(node_cpu_seconds_total{instance="192.168.1.14:9100",mode="idle"})
                  format:
                    type: percent
                    options:
                      maximumFractionDigits: 1
                - label: RAM
                  query: 100 * (1 - node_memory_MemAvailable_bytes{instance="192.168.1.14:9100"} / node_memory_MemTotal_bytes{instance="192.168.1.14:9100"})
                  format:
                    type: percent
                    options:
                      maximumFractionDigits: 1
                - label: Used
                  query: node_memory_MemTotal_bytes{instance="192.168.1.14:9100"} - node_memory_MemAvailable_bytes{instance="192.168.1.14:9100"}
                  format:
                    type: bytes
                    options:
                      maximumFractionDigits: 1
                - label: Load
                  query: node_load1{instance="192.168.1.14:9100"}
                  format:
                    type: number
                    options:
                      maximumFractionDigits: 2
        - Casper:
            icon: mdi-server
            href: https://casper.rcrumana.xyz
            description: 192.168.1.15
            widget:
              type: prometheusmetric
              url: http://kube-prometheus-stack-prometheus.monitoring.svc.cluster.local:9090
              refreshInterval: 1000
              metrics:
                - label: CPU
                  query: 100 * sum(rate(node_cpu_seconds_total{instance="192.168.1.15:9100",mode=~"user|system|nice|irq|softirq|steal"}[1m])) / count(node_cpu_seconds_total{instance="192.168.1.15:9100",mode="idle"})
                  format:
                    type: percent
                    options:
                      maximumFractionDigits: 1
                - label: RAM
                  query: 100 * (1 - node_memory_MemAvailable_bytes{instance="192.168.1.15:9100"} / node_memory_MemTotal_bytes{instance="192.168.1.15:9100"})
                  format:
                    type: percent
                    options:
                      maximumFractionDigits: 1
                - label: Used
                  query: node_memory_MemTotal_bytes{instance="192.168.1.15:9100"} - node_memory_MemAvailable_bytes{instance="192.168.1.15:9100"}
                  format:
                    type: bytes
                    options:
                      maximumFractionDigits: 1
                - label: Load
                  query: node_load1{instance="192.168.1.15:9100"}
                  format:
                    type: number
                    options:
                      maximumFractionDigits: 2

    - Graphs:
        - Melchior:
            widget:
              type: iframe
              name: melchior-node-dashboard
              src: https://grafana.rcrumana.xyz/d/homepage-node-melchior/homepage-node-melchior?orgId=1&timezone=browser&theme=dark&kiosk
              classes: h-96 sm:h-96 md:h-96 lg:h-96 xl:h-96 2xl:h-96
              referrerPolicy: same-origin
        - Balthasar:
            widget:
              type: iframe
              name: balthasar-node-dashboard
              src: https://grafana.rcrumana.xyz/d/homepage-node-balthasar/homepage-node-balthasar?orgId=1&timezone=browser&theme=dark&kiosk
              classes: h-96 sm:h-96 md:h-96 lg:h-96 xl:h-96 2xl:h-96
              referrerPolicy: same-origin
        - Casper:
            widget:
              type: iframe
              name: casper-node-dashboard
              src: https://grafana.rcrumana.xyz/d/homepage-node-casper/homepage-node-casper?orgId=1&timezone=browser&theme=dark&kiosk
              classes: h-96 sm:h-96 md:h-96 lg:h-96 xl:h-96 2xl:h-96
              referrerPolicy: same-origin

  bookmarks.yaml: |
    - Operations:
        - Cluster Repo:
            - abbr: Git
              href: https://github.com/rrumana/k8s-homelab-2
    - Dashboards:
        - Grafana:
            - abbr: Gr
              href: https://grafana.rcrumana.xyz
        - Argo CD:
            - abbr: Argo
              href: https://argocd.rcrumana.xyz
        - Uptime Kuma:
            - abbr: UK
              href: https://uptime.rcrumana.xyz
  widgets.yaml: |
    - search:
        provider: duckduckgo
        target: _blank
  docker.yaml: ""
  custom.css: ""
  custom.js: ""
