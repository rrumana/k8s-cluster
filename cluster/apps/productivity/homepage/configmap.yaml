apiVersion: v1
kind: ConfigMap
metadata:
  name: homepage-config
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
data:
  kubernetes.yaml: |
    mode: cluster
    ingress: true
    gateway: true
  proxmox.yaml: ""
  settings.yaml: |
    title: Rcrumana Cluster
    language: en
    target: _blank
    statusStyle: dot
    useEqualHeights: true
    layout:
      Acquisition:
        header: false
        style: row
        columns: 2
        Calendar:
          header: false
          style: column
          columns: 1
        Media Automation:
          header: false
          style: column
          columns: 1
      Services:
        style: row
        columns: 2
        Media:
          header: false
          style: row
          columns: 2
        Productivity:
          header: false
          style: row
          columns: 2
          Nextcloud:
            header: false
            style: row
            columns: 1
          Other:
            header: false
            style: row
            columns: 1
      Storage:
        style: row
        columns: 3
      Networking:
        style: row
        columns: 3
      Nodes:
        style: row
        columns: 3
      Cluster:
        style: row
        columns: 4
      Portfolio:
        style: row
        columns: 2
  services.yaml: |
    - Acquisition:
        - Calendar:
            - Calendar:
                icon: mdi-calendar-month
                widget:
                  type: calendar
                  view: monthly
                  maxEvents: 12
                  showTime: true
                  timezone: America/Los_Angeles
                  integrations:
                    - type: sonarr
                      service_group: Media Automation
                      service_name: Sonarr
                      color: teal
                      baseUrl: https://sonarr.rcrumana.xyz
                    - type: radarr
                      service_group: Media Automation
                      service_name: Radarr
                      color: amber
                      baseUrl: https://radarr.rcrumana.xyz
                    - type: lidarr
                      service_group: Media Automation
                      service_name: Lidarr
                      color: purple
                      baseUrl: https://lidarr.rcrumana.xyz
        - Media Automation:
            - Jellyseerr:
                icon: jellyseerr.png
                href: https://jellyseerr.rcrumana.xyz
                siteMonitor: http://jellyseerr.media.svc.cluster.local
                namespace: media
                podSelector: app=arr-stack
            - Sonarr:
                icon: sonarr.png
                href: https://sonarr.rcrumana.xyz
                siteMonitor: http://sonarr.media.svc.cluster.local
                namespace: media
                podSelector: app=arr-stack
                widget:
                  type: sonarr
                  url: http://sonarr.media.svc.cluster.local
                  key: "{{HOMEPAGE_VAR_SONARR_API_KEY}}"
                  enableQueue: true
                  fields: []
                  hideErrors: true
            - Radarr:
                icon: radarr.png
                href: https://radarr.rcrumana.xyz
                siteMonitor: http://radarr.media.svc.cluster.local
                namespace: media
                podSelector: app=arr-stack
                widget:
                  type: radarr
                  url: http://radarr.media.svc.cluster.local
                  key: "{{HOMEPAGE_VAR_RADARR_API_KEY}}"
                  enableQueue: true
                  fields: []
                  hideErrors: true
            - Lidarr:
                icon: lidarr.png
                href: https://lidarr.rcrumana.xyz
                siteMonitor: http://lidarr.media.svc.cluster.local
                namespace: media
                podSelector: app=arr-stack
                widget:
                  type: lidarr
                  url: http://lidarr.media.svc.cluster.local
                  key: "{{HOMEPAGE_VAR_LIDARR_API_KEY}}"
                  fields: []
                  hideErrors: true
            - Prowlarr:
                icon: prowlarr.png
                href: https://prowlarr.rcrumana.xyz
                siteMonitor: http://prowlarr.media.svc.cluster.local
                namespace: media
                podSelector: app=arr-stack
                widget:
                  type: prowlarr
                  url: http://prowlarr.media.svc.cluster.local
                  key: "{{HOMEPAGE_VAR_PROWLARR_API_KEY}}"
                  fields: []
                  hideErrors: true
            - qBittorrent:
                icon: qbittorrent.png
                href: https://qbit.rcrumana.xyz
                siteMonitor: http://qbit.media.svc.cluster.local
                description: Primary torrent client
                namespace: media
                podSelector: app=arr-stack
                widget:
                  type: qbittorrent
                  url: http://qbit.media.svc.cluster.local
                  username: "{{HOMEPAGE_VAR_QBIT_USERNAME}}"
                  password: "{{HOMEPAGE_VAR_QBIT_PASSWORD}}"
                  enableLeechProgress: true
                  enableLeechSize: true
                  fields: ["leech", "download", "seed", "upload"]
                  hideErrors: true

    - Services:
        - Media: 
            - Jellyfin:
                icon: jellyfin.png
                href: https://jellyfin.rcrumana.xyz
                description: Media server
                namespace: media
                app: jellyfin
                widget:
                    type: jellyfin
                    url: http://jellyfin.media.svc.cluster.local:8096
                    key: "{{HOMEPAGE_VAR_JELLYFIN_API_KEY}}"
                    version: 2
                    enableBlocks: true
                    enableNowPlaying: false
                    enableUser: true
                    enableMediaControl: true
                    fields: ["movies", "series", "episodes"]
                    hideErrors: true
            - Immich:
                icon: immich.png
                href: https://immich.rcrumana.xyz
                description: Photo library
                namespace: media
                app: immich
                widget:
                    type: immich
                    url: http://immich-server.media.svc.cluster.local:2283
                    key: "{{HOMEPAGE_VAR_IMMICH_API_KEY}}"
                    version: 2
                    fields: ["photos", "videos", "storage"]
                    hideErrors: true
        - Productivity:
            - Nextcloud:
                - Nextcloud:
                    icon: nextcloud.png
                    href: https://nextcloud.rcrumana.xyz
                    description: Files and collaboration
                    namespace: productivity
                    app: nextcloud
                    widget:
                        type: nextcloud
                        url: http://nextcloud.productivity.svc.cluster.local:8080
                        username: "{{HOMEPAGE_VAR_NEXTCLOUD_USERNAME}}"
                        password: "{{HOMEPAGE_VAR_NEXTCLOUD_PASSWORD}}"
                        fields: ["freespace", "activeusers", "numfiles", "numshares"]
                        hideErrors: true
            - Other:
                - LibreChat:
                    icon: librechat.png
                    href: https://chat.rcrumana.xyz
                    description: AI chat frontend
                    namespace: ai
                    app: librechat
                - Vaultwarden:
                    icon: vaultwarden.png
                    href: https://vault.rcrumana.xyz
                    description: Password vault
                    namespace: productivity
                    app: vaultwarden

    - Storage:
        - Ceph:
            icon: ceph.png
            href: https://ceph.rcrumana.xyz
            description: Primary cluster storage
            namespace: rook-ceph
            app: ceph-mgr
            widget:
              type: prometheusmetric
              url: http://kube-prometheus-stack-prometheus.monitoring.svc.cluster.local:9090
              refreshInterval: 15000
              highlight:
                Health:
                  numeric:
                    - level: danger
                      when: lt
                      value: 100
                    - level: good
                      when: eq
                      value: 100
                OSDs:
                  numeric:
                    - level: danger
                      when: lt
                      value: 100
                    - level: good
                      when: eq
                      value: 100
                PGs:
                  numeric:
                    - level: danger
                      when: lt
                      value: 100
                    - level: good
                      when: eq
                      value: 100
                Used:
                  numeric:
                    - level: danger
                      when: gte
                      value: 90
                    - level: warn
                      when: gte
                      value: 75
              metrics:
                - label: Health
                  query: '1 - clamp_max(ceph_health_status, 1)'
                  format:
                    type: percent
                    scale: 100
                    options:
                      maximumFractionDigits: 0
                - label: OSDs
                  query: 'sum(ceph_osd_up) / count(ceph_osd_metadata)'
                  format:
                    type: percent
                    scale: 100
                    options:
                      maximumFractionDigits: 0
                - label: PGs
                  query: 'sum(ceph_pg_clean) / sum(ceph_pg_total)'
                  format:
                    type: percent
                    scale: 100
                    options:
                      maximumFractionDigits: 0
                - label: Used
                  query: 'ceph_cluster_total_used_bytes / ceph_cluster_total_bytes'
                  format:
                    type: percent
                    scale: 100
                    options:
                      maximumFractionDigits: 0
        - MinIO:
            icon: minio.png
            href: https://minio.rcrumana.xyz
            siteMonitor: http://minio-api.other.svc.cluster.local:9000/minio/health/live
            description: Object storage and backup target
        - Backups NAS:
            icon: truenas.png
            href: https://nas.rcrumana.xyz
            description: NAS for backups
            widget:
              type: truenas
              url: https://nas.rcrumana.xyz
              version: 2
              key: "{{HOMEPAGE_VAR_TRUENAS_BACKUPS_API_KEY}}"
              enablePools: true
              nasType: scale
              fields: ["load", "uptime", "alerts"]
              hideErrors: true

    - Networking:
        - OPNsense:
            icon: opnsense.png
            href: https://router.rcrumana.xyz
            siteMonitor: https://router.rcrumana.xyz
            description: Router and firewall
            widget:
              type: opnsense
              url: https://router.rcrumana.xyz
              username: "{{HOMEPAGE_VAR_OPNSENSE_KEY}}"
              password: "{{HOMEPAGE_VAR_OPNSENSE_SECRET}}"
              wan: "{{HOMEPAGE_VAR_OPNSENSE_WAN}}"
              fields: ["cpu", "memory", "wanUpload", "wanDownload"]
              hideErrors: true
        - UniFi:
            icon: unifi.png
            href: https://unifi.rcrumana.xyz
            description: Network controller
            namespace: productivity
            app: unifi-os-server
        - Headscale:
            icon: headscale.png
            href: https://headscale.rcrumana.xyz/web
            description: Tailnet admin UI
            namespace: other
            app: headscale
    - Nodes:
        - melchior-1:
            icon: mdi-server
            href: https://grafana.rcrumana.xyz/d/fac67cfbe174d3ef53eb473d73d9212f/node-exporter-use-method-node?orgId=1&var-datasource=prometheus&var-cluster=&var-instance=192.168.1.13%3A9100
            description: Control plane
            widget:
              type: prometheusmetric
              url: http://kube-prometheus-stack-prometheus.monitoring.svc.cluster.local:9090
              refreshInterval: 15000
              highlight: &node_health_highlights
                Ready:
                  numeric:
                    - level: danger
                      when: eq
                      value: 0
                    - level: good
                      when: eq
                      value: 100
                CPU:
                  numeric:
                    - level: danger
                      when: gte
                      value: 95
                    - level: warn
                      when: gte
                      value: 80
                RAM:
                  numeric:
                    - level: danger
                      when: gte
                      value: 95
                    - level: warn
                      when: gte
                      value: 85
                Temp:
                  numeric:
                    - level: danger
                      when: gte
                      value: 90
                    - level: warn
                      when: gte
                      value: 80
              metrics:
                - label: Ready
                  query: 'kube_node_status_condition{node="melchior-1",condition="Ready",status="true"}'
                  format:
                    type: percent
                    scale: 100
                    options:
                      maximumFractionDigits: 0
                - label: CPU
                  query: 'rate(node_cpu_usage_seconds_total{node="melchior-1"}[2m]) / on(node) kube_node_status_capacity{node="melchior-1",resource="cpu",unit="core"}'
                  format:
                    type: percent
                    scale: 100
                    options:
                      maximumFractionDigits: 0
                - label: RAM
                  query: 'node_memory_working_set_bytes{node="melchior-1"} / on(node) kube_node_status_capacity{node="melchior-1",resource="memory",unit="byte"}'
                  format:
                    type: percent
                    scale: 100
                    options:
                      maximumFractionDigits: 0
                - label: Temp
                  query: 'max(node_hwmon_temp_celsius{instance="192.168.1.13:9100",chip=~"pci.*18_3"})'
                  format:
                    type: number
                    suffix: " °C"
                    options:
                      maximumFractionDigits: 0
        - balthasar-2:
            icon: mdi-server
            href: https://grafana.rcrumana.xyz/d/fac67cfbe174d3ef53eb473d73d9212f/node-exporter-use-method-node?orgId=1&var-datasource=prometheus&var-cluster=&var-instance=192.168.1.14%3A9100
            description: Control plane
            widget:
              type: prometheusmetric
              url: http://kube-prometheus-stack-prometheus.monitoring.svc.cluster.local:9090
              refreshInterval: 15000
              highlight: *node_health_highlights
              metrics:
                - label: Ready
                  query: 'kube_node_status_condition{node="balthasar-2",condition="Ready",status="true"}'
                  format:
                    type: percent
                    scale: 100
                    options:
                      maximumFractionDigits: 0
                - label: CPU
                  query: 'rate(node_cpu_usage_seconds_total{node="balthasar-2"}[2m]) / on(node) kube_node_status_capacity{node="balthasar-2",resource="cpu",unit="core"}'
                  format:
                    type: percent
                    scale: 100
                    options:
                      maximumFractionDigits: 0
                - label: RAM
                  query: 'node_memory_working_set_bytes{node="balthasar-2"} / on(node) kube_node_status_capacity{node="balthasar-2",resource="memory",unit="byte"}'
                  format:
                    type: percent
                    scale: 100
                    options:
                      maximumFractionDigits: 0
                - label: Temp
                  query: 'max(node_hwmon_temp_celsius{instance="192.168.1.14:9100",chip=~"pci.*18_3"})'
                  format:
                    type: number
                    suffix: " °C"
                    options:
                      maximumFractionDigits: 0
        - casper-3:
            icon: mdi-server
            href: https://grafana.rcrumana.xyz/d/fac67cfbe174d3ef53eb473d73d9212f/node-exporter-use-method-node?orgId=1&var-datasource=prometheus&var-cluster=&var-instance=192.168.1.15%3A9100
            description: Control plane
            widget:
              type: prometheusmetric
              url: http://kube-prometheus-stack-prometheus.monitoring.svc.cluster.local:9090
              refreshInterval: 15000
              highlight: *node_health_highlights
              metrics:
                - label: Ready
                  query: 'kube_node_status_condition{node="casper-3",condition="Ready",status="true"}'
                  format:
                    type: percent
                    scale: 100
                    options:
                      maximumFractionDigits: 0
                - label: CPU
                  query: 'rate(node_cpu_usage_seconds_total{node="casper-3"}[2m]) / on(node) kube_node_status_capacity{node="casper-3",resource="cpu",unit="core"}'
                  format:
                    type: percent
                    scale: 100
                    options:
                      maximumFractionDigits: 0
                - label: RAM
                  query: 'node_memory_working_set_bytes{node="casper-3"} / on(node) kube_node_status_capacity{node="casper-3",resource="memory",unit="byte"}'
                  format:
                    type: percent
                    scale: 100
                    options:
                      maximumFractionDigits: 0
                - label: Temp
                  query: 'max(node_hwmon_temp_celsius{instance="192.168.1.15:9100",chip=~"pci.*18_3"})'
                  format:
                    type: number
                    suffix: " °C"
                    options:
                      maximumFractionDigits: 0
        - eva-1:
            icon: mdi-server
            href: https://grafana.rcrumana.xyz/d/fac67cfbe174d3ef53eb473d73d9212f/node-exporter-use-method-node?orgId=1&var-datasource=prometheus&var-cluster=&var-instance=192.168.1.16%3A9100
            description: Storage plane
            widget:
              type: prometheusmetric
              url: http://kube-prometheus-stack-prometheus.monitoring.svc.cluster.local:9090
              refreshInterval: 15000
              highlight: *node_health_highlights
              metrics:
                - label: Ready
                  query: 'kube_node_status_condition{node="eva-1",condition="Ready",status="true"}'
                  format:
                    type: percent
