                - label: RAM
                  query: 'node_memory_working_set_bytes{node="eva-1"} / on(node) kube_node_status_capacity{node="eva-1",resource="memory",unit="byte"}'
                  format:
                    type: percent
                    scale: 100
                    options:
                      maximumFractionDigits: 0
                - label: Temp
                  query: 'max(node_hwmon_temp_celsius{instance="192.168.1.16:9100",chip=~"pci.*18_3"})'
                  format:
                    type: number
                    suffix: " °C"
                    options:
                      maximumFractionDigits: 0
        - eva-2:
            icon: mdi-server
            href: https://grafana.rcrumana.xyz/d/fac67cfbe174d3ef53eb473d73d9212f/node-exporter-use-method-node?orgId=1&var-datasource=prometheus&var-cluster=&var-instance=192.168.1.17%3A9100
            description: Storage plane
            widget:
