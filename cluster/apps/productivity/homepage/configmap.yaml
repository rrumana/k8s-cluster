apiVersion: v1
kind: ConfigMap
metadata:
  name: homepage-config
data:
  kubernetes.yaml: |
    mode: cluster
    ingress: true
    gateway: true
  proxmox.yaml: ""
  settings.yaml: |
    title: Rcrumana Cluster
    language: en
    target: _blank
    statusStyle: dot
    layout:
      Acquisition:
        header: false
        style: row
        columns: 2
        Calendar:
          header: false
          style: column
          columns: 1
        Media Automation:
          header: false
          style: column
          columns: 1
      Services:
        style: row
        columns: 2
        Media:
          header: false
          style: row
          columns: 2
        Productivity:
          header: false
          style: row
          columns: 2
          Nextcloud:
            header: false
            style: row
            columns: 1
          Other:
            header: false
            style: row
            columns: 1
      Storage and Networking:
        style: row
        columns: 2
        Storage:
          header: false
          style: row
          columns: 2
        Networking:
          header: false
          style: row
          columns: 2
          Firewall:
            header: false
            style: row
            columns: 1
          Network Services:
            header: false
            style: row
            columns: 1
      Torrenting:
        style: row
        columns: 3
      Cluster:
        style: row
        columns: 5
      Graphs:
        style: row
        columns: 1
      Portfolio:
        style: row
        columns: 2
  services.yaml: |
    - Acquisition:
        - Calendar:
            - Calendar:
                icon: mdi-calendar-month
                widget:
                  type: calendar
                  view: monthly
                  maxEvents: 12
                  showTime: true
                  timezone: America/Los_Angeles
                  integrations:
                    - type: sonarr
                      service_group: Media Automation
                      service_name: Sonarr
                      color: teal
                      baseUrl: https://sonarr.rcrumana.xyz
                    - type: radarr
                      service_group: Media Automation
                      service_name: Radarr
                      color: amber
                      baseUrl: https://radarr.rcrumana.xyz
                    - type: lidarr
                      service_group: Media Automation
                      service_name: Lidarr
                      color: purple
                      baseUrl: https://lidarr.rcrumana.xyz
        - Media Automation:
            - Jellyseerr:
                icon: jellyseerr.png
                href: https://jellyseerr.rcrumana.xyz
                siteMonitor: http://jellyseerr.media.svc.cluster.local
                namespace: media
                podSelector: app=arr-stack
            - Sonarr:
                icon: sonarr.png
                href: https://sonarr.rcrumana.xyz
                siteMonitor: http://sonarr.media.svc.cluster.local
                namespace: media
                podSelector: app=arr-stack
                widget:
                  type: sonarr
                  url: http://sonarr.media.svc.cluster.local
                  key: "{{HOMEPAGE_VAR_SONARR_API_KEY}}"
                  enableQueue: true
                  fields: []
                  hideErrors: true
            - Radarr:
                icon: radarr.png
                href: https://radarr.rcrumana.xyz
                siteMonitor: http://radarr.media.svc.cluster.local
                namespace: media
                podSelector: app=arr-stack
                widget:
                  type: radarr
                  url: http://radarr.media.svc.cluster.local
                  key: "{{HOMEPAGE_VAR_RADARR_API_KEY}}"
                  enableQueue: true
                  fields: []
                  hideErrors: true
            - Lidarr:
                icon: lidarr.png
                href: https://lidarr.rcrumana.xyz
                siteMonitor: http://lidarr.media.svc.cluster.local
                namespace: media
                podSelector: app=arr-stack
                widget:
                  type: lidarr
                  url: http://lidarr.media.svc.cluster.local
                  key: "{{HOMEPAGE_VAR_LIDARR_API_KEY}}"
                  fields: []
                  hideErrors: true
            - Prowlarr:
                icon: prowlarr.png
                href: https://prowlarr.rcrumana.xyz
                siteMonitor: http://prowlarr.media.svc.cluster.local
                namespace: media
                podSelector: app=arr-stack
                widget:
                  type: prowlarr
                  url: http://prowlarr.media.svc.cluster.local
                  key: "{{HOMEPAGE_VAR_PROWLARR_API_KEY}}"
                  fields: []
                  hideErrors: true

    - Services:
        - Media: 
            - Jellyfin:
                icon: jellyfin.png
                href: https://jellyfin.rcrumana.xyz
                description: Media server
                namespace: media
                app: jellyfin
                widget:
                type: jellyfin
                url: http://jellyfin.media.svc.cluster.local:8096
                key: "{{HOMEPAGE_VAR_JELLYFIN_API_KEY}}"
                version: 2
                enableBlocks: true
                enableNowPlaying: false
                enableUser: true
                enableMediaControl: true
                fields: ["movies", "series", "episodes"]
                hideErrors: true
            - Immich:
                icon: immich.png
                href: https://immich.rcrumana.xyz
                description: Photo library
                namespace: media
                app: immich
                widget:
                type: immich
                url: http://immich-server.media.svc.cluster.local:2283
                key: "{{HOMEPAGE_VAR_IMMICH_API_KEY}}"
                version: 2
                fields: ["photos", "videos", "storage"]
                hideErrors: true
        - Productivity:
            - Nextcloud:
                - Nextcloud:
                    icon: nextcloud.png
                    href: https://nextcloud.rcrumana.xyz
                    description: Files and collaboration
                    namespace: productivity
                    app: nextcloud
                    widget:
                    type: nextcloud
                    url: http://nextcloud.productivity.svc.cluster.local:8080
                    username: "{{HOMEPAGE_VAR_NEXTCLOUD_USERNAME}}"
                    password: "{{HOMEPAGE_VAR_NEXTCLOUD_PASSWORD}}"
                    fields: ["freespace", "activeusers", "numfiles", "numshares"]
                    hideErrors: true
            - Other:
                - LibreChat:
                    icon: librechat.png
                    href: https://chat.rcrumana.xyz
                    description: AI chat frontend
                    namespace: ai
                    app: librechat
                - Vaultwarden:
                    icon: vaultwarden.png
                    href: https://vault.rcrumana.xyz
                    description: Password vault
                    namespace: productivity
                    app: vaultwarden

    - Storage and Networking:
        - Storage:
            - Media NAS:
                icon: truenas.png
                href: https://nas-2.rcrumana.xyz
                description: Primary NAS
                widget:
                  type: truenas
                  url: https://nas-2.rcrumana.xyz
                  version: 2
                  key: "{{HOMEPAGE_VAR_TRUENAS_MEDIA_API_KEY}}"
                  enablePools: true
                  nasType: scale
                  fields: ["load", "uptime", "alerts"]
                  hideErrors: true
            - Backups NAS:
                icon: truenas.png
                href: https://nas.rcrumana.xyz
                description: NAS for backups
                widget:
                  type: truenas
                  url: https://nas.rcrumana.xyz
                  version: 2
                  key: "{{HOMEPAGE_VAR_TRUENAS_BACKUPS_API_KEY}}"
                  enablePools: true
                  nasType: scale
                  fields: ["load", "uptime", "alerts"]
                  hideErrors: true
        - Networking:
            - Firewall:
                - OPNsense:
                    icon: opnsense.png
                    href: https://router.rcrumana.xyz
                    description: Router and firewall
                    widget:
                      type: opnsense
                      url: https://router.rcrumana.xyz
                      username: "{{HOMEPAGE_VAR_OPNSENSE_KEY}}"
                      password: "{{HOMEPAGE_VAR_OPNSENSE_SECRET}}"
                      wan: "{{HOMEPAGE_VAR_OPNSENSE_WAN}}"
                      fields: ["cpu", "memory", "wanUpload", "wanDownload"]
                      hideErrors: true
            - Network Services:
                - UniFi:
                    icon: unifi.png
                    href: https://unifi.rcrumana.xyz
                    description: Network controller
                    namespace: productivity
                    app: unifi-os-server
                - Headscale:
                    icon: headscale.png
                    href: https://headscale.rcrumana.xyz/web
                    description: Tailnet admin UI
                    namespace: other
                    app: headscale

    - Torrenting:
        - qBittorrent:
            icon: qbittorrent.png
            href: https://qbit.rcrumana.xyz
            description: Primary torrent client
            namespace: media
            podSelector: app=arr-stack
            widget:
              type: qbittorrent
              url: http://qbit.media.svc.cluster.local
              username: "{{HOMEPAGE_VAR_QBIT_USERNAME}}"
              password: "{{HOMEPAGE_VAR_QBIT_PASSWORD}}"
              enableLeechProgress: true
              enableLeechSize: true
              fields: ["leech", "download", "seed", "upload"]
              hideErrors: true
        - qBittorrent LTS:
            icon: qbittorrent.png
            href: https://qbit-lts.rcrumana.xyz
            description: LTS torrent client
            namespace: media
            app: arr-lts
            widget:
              type: qbittorrent
              url: http://qbit-lts.media.svc.cluster.local
              username: "{{HOMEPAGE_VAR_QBIT_LTS_USERNAME}}"
              password: "{{HOMEPAGE_VAR_QBIT_LTS_PASSWORD}}"
              enableLeechProgress: true
              enableLeechSize: true
              fields: ["leech", "download", "seed", "upload"]
              hideErrors: true
        - qBittorrent LTS 2:
            icon: qbittorrent.png
            href: https://qbit-lts2.rcrumana.xyz
            description: Secondary LTS torrent client
            namespace: media
            app: arr-lts2
            widget:
              type: qbittorrent
              url: http://qbit-lts2.media.svc.cluster.local
              username: "{{HOMEPAGE_VAR_QBIT_LTS2_USERNAME}}"
              password: "{{HOMEPAGE_VAR_QBIT_LTS2_PASSWORD}}"
              enableLeechProgress: true
              enableLeechSize: true
              fields: ["leech", "download", "seed", "upload"]
              hideErrors: true

    - Cluster:
        - Argo CD:
            icon: argo-cd.png
            href: https://argocd.rcrumana.xyz
            description: GitOps control plane
            namespace: argocd
            app: argocd-server
            widget:
              type: argocd
              url: http://argocd-server.argocd.svc.cluster.local
              key: "{{HOMEPAGE_VAR_ARGOCD_TOKEN}}"
              fields: ["apps", "synced", "healthy"]
              hideErrors: true
        - Grafana:
            icon: grafana.png
            href: https://grafana.rcrumana.xyz
            description: Metrics and log dashboards
            namespace: monitoring
            app: grafana
            widget:
              type: grafana
              version: 2
              alerts: alertmanager
              url: http://kube-prometheus-stack-grafana.monitoring.svc.cluster.local
              username: "{{HOMEPAGE_VAR_GRAFANA_USERNAME}}"
              password: "{{HOMEPAGE_VAR_GRAFANA_PASSWORD}}"
              fields: ["dashboards", "datasources", "totalalerts", "alertstriggered"]
              hideErrors: true
        - Uptime Kuma:
            icon: uptime-kuma.png
            href: https://uptime.rcrumana.xyz
            description: Service uptime checks
            namespace: productivity
            app: uptime-kuma
            widget:
              type: uptimekuma
              url: http://uptime-kuma.productivity.svc.cluster.local
              slug: "{{HOMEPAGE_VAR_UPTIME_KUMA_SLUG}}"
              fields: ["up", "down", "uptime", "incident"]
              hideErrors: true
        - Ceph:
            icon: ceph.png
            href: https://ceph.rcrumana.xyz
            description: Ceph storage dashboard
            namespace: rook-ceph
            app: ceph-mgr
        - MinIO:
            icon: minio.png
            href: https://minio.rcrumana.xyz
            description: Object storage console

    - Graphs:
        - Melchior:
            widget:
              type: iframe
              name: melchior-node-dashboard
              src: https://grafana.rcrumana.xyz/d/homepage-node-melchior/homepage-node-melchior?orgId=1&timezone=browser&theme=dark&kiosk
              classes: h-96 sm:h-96 md:h-96 lg:h-96 xl:h-96 2xl:h-96
              referrerPolicy: same-origin
        - Balthasar:
            widget:
              type: iframe
              name: balthasar-node-dashboard
              src: https://grafana.rcrumana.xyz/d/homepage-node-balthasar/homepage-node-balthasar?orgId=1&timezone=browser&theme=dark&kiosk
              classes: h-96 sm:h-96 md:h-96 lg:h-96 xl:h-96 2xl:h-96
              referrerPolicy: same-origin
        - Casper:
            widget:
              type: iframe
              name: casper-node-dashboard
              src: https://grafana.rcrumana.xyz/d/homepage-node-casper/homepage-node-casper?orgId=1&timezone=browser&theme=dark&kiosk
              classes: h-96 sm:h-96 md:h-96 lg:h-96 xl:h-96 2xl:h-96
              referrerPolicy: same-origin

    - Portfolio:
        - Portfolio:
            icon: mdi-web
            href: https://rcrumana.xyz
            description: Public portfolio
            namespace: web
            app: portfolio
        - Portfolio Staging:
            icon: mdi-web
            href: https://staging.rcrumana.xyz
            description: Staging portfolio
            namespace: web
            app: portfolio-staging

  bookmarks.yaml: ""
  widgets.yaml: ""
  docker.yaml: ""
  custom.css: ""
  custom.js: ""
