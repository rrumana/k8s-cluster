        - eva-3:
            icon: mdi-server
            href: https://grafana.rcrumana.xyz/d/fac67cfbe174d3ef53eb473d73d9212f/node-exporter-use-method-node?orgId=1&var-datasource=prometheus&var-cluster=&var-instance=192.168.1.18%3A9100
            description: Storage plane
            widget:
