apiVersion: apps/v1
kind: Deployment
metadata:
  name: elasticsearch
  annotations:
    argocd.argoproj.io/sync-wave: "-30"
  labels:
    app: elasticsearch
spec:
  # Keep the storage-class migration stopped while the Eva storage plane recovers.
  replicas: 0
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: elasticsearch
  template:
    metadata:
      annotations:
        linkerd.io/inject: enabled
      labels:
        app: elasticsearch
    spec:
      serviceAccountName: elasticsearch
      initContainers:
        - name: migrate-storage
          image: harbor.rcrumana.xyz/proxy-dockerhub/library/busybox:1.38
          command:
            - sh
            - -c
            - |
              set -eux
              find /target -mindepth 1 -maxdepth 1 ! -name lost+found -exec rm -rf -- {} +
              cp -a /source/. /target/
              sync
              du -sk /source /target
          securityContext:
            runAsUser: 0
            runAsGroup: 0
          volumeMounts:
            - name: migration-source
              mountPath: /source
              readOnly: true
            - name: data
              mountPath: /target
      containers:
        - name: elasticsearch
          image: harbor.rcrumana.xyz/mirror/elasticsearch/elasticsearch:9.3.2
          imagePullPolicy: IfNotPresent
          env:
            - name: discovery.type
              value: "single-node"
            - name: xpack.security.enabled
              value: "false"
            - name: xpack.ml.enabled
              value: "false"
            - name: ES_JAVA_OPTS
              value: "-Xms1g -Xmx1g"
            - name: network.host
              value: "0.0.0.0"
          ports:
            - name: http
              containerPort: 9200
            - name: transport
              containerPort: 9300
          volumeMounts:
            - name: data
              mountPath: /usr/share/elasticsearch/data
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 60
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 6
          resources:
            requests:
              cpu: "500m"
              memory: "2Gi"
            limits:
              cpu: "24"
              memory: "4Gi"
      volumes:
        - name: migration-source
          persistentVolumeClaim:
            claimName: elasticsearch-data
        - name: data
          persistentVolumeClaim:
            claimName: elasticsearch-data-critical
