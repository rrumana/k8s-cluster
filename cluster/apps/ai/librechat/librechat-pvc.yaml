apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: librechat-data
spec:
  storageClassName: ceph-block
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: librechat-data-critical
  annotations:
    argocd.argoproj.io/sync-wave: "-20"
spec:
  storageClassName: ceph-block-critical
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi
