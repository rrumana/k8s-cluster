apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: librechat-meilisearch
  annotations:
    argocd.argoproj.io/sync-wave: "-10"
  labels:
    app: librechat-meilisearch
spec:
  serviceName: librechat-meilisearch
  replicas: 1
  selector:
    matchLabels:
      app: librechat-meilisearch
  template:
    metadata:
      annotations:
        linkerd.io/inject: enabled
      labels:
        app: librechat-meilisearch
    spec:
      serviceAccountName: librechat-meilisearch
      terminationGracePeriodSeconds: 30
      initContainers:
        - name: migrate-storage
          image: harbor.rcrumana.xyz/proxy-dockerhub/library/busybox:1.38
          command:
            - sh
            - -c
            - |
              set -eux
              find /target -mindepth 1 -maxdepth 1 ! -name lost+found -exec rm -rf -- {} +
              cp -a /source/. /target/
              sync
              du -sk /source /target
          securityContext:
            runAsUser: 0
            runAsGroup: 0
          volumeMounts:
            - name: migration-source
              mountPath: /source
              readOnly: true
            - name: meilisearch-data
              mountPath: /target
      containers:
        - name: meilisearch
          image: harbor.rcrumana.xyz/proxy-dockerhub/getmeili/meilisearch:v1.49
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 7700
          env:
            - name: MEILI_MASTER_KEY
              valueFrom:
                secretKeyRef:
                  name: librechat-secret
                  key: MEILI_MASTER_KEY
          resources:
            requests:
              cpu: "300m"
              memory: "1Gi"
            limits:
              cpu: "2"
              memory: "4Gi"
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
          volumeMounts:
            - name: meilisearch-data
              mountPath: /meili_data
      volumes:
        - name: migration-source
          persistentVolumeClaim:
            claimName: librechat-meilisearch-data
        - name: meilisearch-data
          persistentVolumeClaim:
            claimName: librechat-meilisearch-data-critical
