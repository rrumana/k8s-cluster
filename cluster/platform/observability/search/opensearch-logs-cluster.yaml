apiVersion: opensearch.opster.io/v1
kind: OpenSearchCluster
metadata:
  name: opensearch-logs
  namespace: search
spec:
  confMgmt:
    smartScaler: true
  general:
    serviceName: opensearch-logs
    version: "3.4.0"
    image: harbor.rcrumana.xyz/mirror/opensearchproject/opensearch:3.4.0
    vendor: Opensearch
    serviceAccount: opensearch-logs
    setVMMaxMapCount: true
    drainDataNodes: true
  initHelper:
    image: harbor.rcrumana.xyz/mirror/library/busybox:1.36
    version: "1.36"
  dashboards:
    enable: false
    replicas: 1
    version: "3.4.0"
  security:
    tls:
      transport:
        generate: true
        perNode: true
      http:
        generate: true
    config:
      adminCredentialsSecret:
        name: opensearch-admin-credentials
      securityConfigSecret:
        name: opensearch-security-config
  nodePools:
    # Temporary source pool. Remove after the final node is empty and the
    # app-replicated pool remains green by itself.
    - component: logs
      replicas: 0
      diskSize: "200Gi"
      jvm: "-Xms2g -Xmx2g"
      nodeSelector:
        homelab.rcrumana.xyz/node-plane: storage
      tolerations:
        - key: homelab.rcrumana.xyz/storage
          operator: Equal
          value: "true"
          effect: NoSchedule
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  opster.io/opensearch-cluster: opensearch-logs
                  opster.io/opensearch-nodepool: logs
              topologyKey: kubernetes.io/hostname
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              opster.io/opensearch-cluster: opensearch-logs
              opster.io/opensearch-nodepool: logs
      resources:
        requests:
          cpu: "1"
          memory: 4Gi
        limits:
          cpu: "4"
          memory: 8Gi
      roles:
        - cluster_manager
        - data
        - ingest
    - component: logs-app-replicated
      replicas: 3
      diskSize: "200Gi"
      persistence:
        pvc:
          storageClass: ceph-block-app-replicated
          accessModes:
            - ReadWriteOnce
      jvm: "-Xms2g -Xmx2g"
      nodeSelector:
        homelab.rcrumana.xyz/node-plane: storage
      tolerations:
        - key: homelab.rcrumana.xyz/storage
          operator: Equal
          value: "true"
          effect: NoSchedule
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  opster.io/opensearch-cluster: opensearch-logs
                  opster.io/opensearch-nodepool: logs-app-replicated
              topologyKey: kubernetes.io/hostname
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              opster.io/opensearch-cluster: opensearch-logs
              opster.io/opensearch-nodepool: logs-app-replicated
      resources:
        requests:
          cpu: "1"
          memory: 4Gi
        limits:
          cpu: "4"
          memory: 8Gi
      roles:
        - cluster_manager
        - data
        - ingest
