apiVersion: v1
kind: ConfigMap
metadata:
  name: opensearch-ism-interval-v1
  namespace: search
  annotations:
    argocd.argoproj.io/sync-wave: "5"
    storage.rcrumana.xyz/safety-property: >-
      Changes only the dynamic ISM scheduler interval. The accelerate mode sets
      the supported one-minute minimum; the separately rendered restore mode
      removes the override and verifies the five-minute default is effective.
data:
  configure.py: |
    import base64
    import json
    import os
    import ssl
    import time
    import urllib.error
    import urllib.request


    BASE_URL = os.environ.get(
        "OPENSEARCH_URL",
        "https://opensearch-logs.search.svc.cluster.local:9200",
    ).rstrip("/")
    MODE = os.environ["MODE"]
    USERNAME_FILE = "/credentials/username"
    PASSWORD_FILE = "/credentials/password"
    CA_FILE = "/tls/ca.crt"
    SETTING = "plugins.index_state_management.job_interval"


    def read_text(path):
        with open(path, "r", encoding="utf-8") as handle:
            value = handle.read().strip()
        if not value:
            raise RuntimeError(f"required file is empty: {path}")
        return value


    username = read_text(USERNAME_FILE)
    password = read_text(PASSWORD_FILE)
    authorization = base64.b64encode(
        f"{username}:{password}".encode("utf-8")
    ).decode("ascii")
    tls_context = ssl.create_default_context(cafile=CA_FILE)


    def request(method, path, body=None):
        payload = None
        headers = {
            "Accept": "application/json",
            "Authorization": f"Basic {authorization}",
        }
        if body is not None:
            payload = json.dumps(body, separators=(",", ":")).encode("utf-8")
            headers["Content-Type"] = "application/json"
        req = urllib.request.Request(
            f"{BASE_URL}{path}",
            data=payload,
            headers=headers,
            method=method,
        )
        try:
            with urllib.request.urlopen(
                req, context=tls_context, timeout=20
            ) as response:
                raw = response.read()
                return json.loads(raw) if raw else {}
        except urllib.error.HTTPError as error:
            detail = error.read(4096).decode("utf-8", errors="replace")
            raise RuntimeError(
                f"{method} {path} returned HTTP {error.code}: {detail}"
            ) from error


    def require_stably_green():
        for pass_number in range(1, 3):
            health = request(
                "GET",
                "/_cluster/health?wait_for_status=green&timeout=60s",
            )
            required = {
                "status": "green",
                "number_of_nodes": 3,
                "number_of_data_nodes": 3,
                "unassigned_shards": 0,
                "number_of_pending_tasks": 0,
            }
            actual = {key: health.get(key) for key in required}
            if actual != required:
                raise RuntimeError(
                    "OpenSearch is not stably green: "
                    f"required={required!r} actual={actual!r}"
                )
            print(f"OpenSearch green pass={pass_number}/2")
            if pass_number == 1:
                time.sleep(5)


    def settings():
        payload = request(
            "GET",
            "/_cluster/settings?include_defaults=true&flat_settings=true",
        )
        return {
            "persistent": (payload.get("persistent") or {}).get(SETTING),
            "transient": (payload.get("transient") or {}).get(SETTING),
            "default": (payload.get("defaults") or {}).get(SETTING),
        }


    def main():
        if MODE not in ("accelerate", "restore"):
            raise RuntimeError(f"unsupported MODE={MODE!r}")

        require_stably_green()
        before = settings()
        if before["transient"] is not None:
            raise RuntimeError(
                f"refusing to override transient {SETTING}={before['transient']!r}"
            )
        before_persistent = (
            None
            if before["persistent"] is None
            else str(before["persistent"])
        )
        if before_persistent not in (None, "1"):
            raise RuntimeError(
                f"unexpected persistent {SETTING}={before['persistent']!r}"
            )
        if before["default"] is not None and str(before["default"]) != "5":
            raise RuntimeError(
                f"unexpected default {SETTING}={before['default']!r}"
            )
        if before_persistent is None and str(before["default"]) != "5":
            raise RuntimeError(
                f"default {SETTING} is not visible without an override: "
                f"{before['default']!r}"
            )

        if MODE == "accelerate":
            desired = 1
        else:
            desired = None

        if (MODE == "accelerate" and str(before["persistent"]) == "1") or (
            MODE == "restore" and before["persistent"] is None
        ):
            print(f"mode={MODE} already satisfied before={before!r}")
        else:
            response = request(
                "PUT",
                "/_cluster/settings",
                {"persistent": {SETTING: desired}},
            )
            if response.get("acknowledged") is not True:
                raise RuntimeError(
                    f"cluster setting update was not acknowledged: {response!r}"
                )

        after = settings()
        expected_persistent = "1" if MODE == "accelerate" else None
        actual_persistent = (
            None
            if after["persistent"] is None
            else str(after["persistent"])
        )
        expected_default = (
            (None, "5") if MODE == "accelerate" else ("5",)
        )
        actual_default = (
            None if after["default"] is None else str(after["default"])
        )
        if (
            after["transient"] is not None
            or actual_persistent != expected_persistent
            or actual_default not in expected_default
        ):
            raise RuntimeError(
                f"failed to verify mode={MODE}: before={before!r} after={after!r}"
            )
        require_stably_green()
        print(
            f"verified mode={MODE} setting={SETTING} "
            f"before={before!r} after={after!r}"
        )


    if __name__ == "__main__":
        main()
