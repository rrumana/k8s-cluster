apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: search

resources:
  - opensearch-logs-cluster.yaml
  - data-prepper-configmap.yaml
  - data-prepper-deployment.yaml
  - data-prepper-service.yaml
  - fluent-bit-clusterrole.yaml
  - fluent-bit-clusterrolebinding.yaml
  - fluent-bit-configmap.yaml
  - fluent-bit-daemonset.yaml
  - fluent-bit-service.yaml
  - opensearch-retention-stage1-configmap.yaml
  # opensearch-retention-stage1-job.yaml is deliberately dormant until the
  # reviewed activation revision: rendering a suspended Job would mark this
  # Argo CD application Suspended.

commonLabels:
  app.kubernetes.io/part-of: observability-logging
  app.kubernetes.io/managed-by: argocd
