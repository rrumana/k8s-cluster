apiVersion: batch/v1
kind: Job
metadata:
  name: opensearch-retention-stage2-armed-v1
  namespace: search
  annotations:
    argocd.argoproj.io/sync-wave: "10"
    storage.rcrumana.xyz/activation-gate: >-
      Keep this file outside Kustomize and keep the Job suspended until stage 1
      is proven on every index and both OpenSearch and Ceph are healthy. A reviewed
      activation revision must render it and set spec.suspend=false. Do not make
      concurrent ISM policy changes while this one-shot Job is running.
    storage.rcrumana.xyz/safety-property: >-
      This stage OCC-updates exact hold policies to ARMED policies whose delete
      states are unreachable; it never adds a transition to delete.
  labels:
    app.kubernetes.io/name: opensearch-retention
    app.kubernetes.io/component: policy-arm
spec:
  suspend: true
  backoffLimit: 0
  activeDeadlineSeconds: 1200
  completions: 1
  parallelism: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: opensearch-retention
        app.kubernetes.io/component: policy-arm
    spec:
      restartPolicy: Never
      automountServiceAccountToken: false
      imagePullSecrets:
        - name: harbor-pull-creds
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: arm-and-verify
          image: harbor.rcrumana.xyz/proxy-dockerhub/library/python:3.14-slim
          imagePullPolicy: IfNotPresent
          command:
            - python3
            - /config/arm-and-verify.py
          env:
            - name: PYTHONDONTWRITEBYTECODE
              value: "1"
            - name: PYTHONUNBUFFERED
              value: "1"
            - name: OPENSEARCH_URL
              value: https://opensearch-logs.search.svc.cluster.local:9200
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 250m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
          volumeMounts:
            - name: config
              mountPath: /config
              readOnly: true
            - name: credentials
              mountPath: /credentials
              readOnly: true
            - name: tls-ca
              mountPath: /tls
              readOnly: true
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: config
          configMap:
            name: opensearch-retention-stage2-armed-v1
        - name: credentials
          secret:
            secretName: opensearch-admin-credentials
            defaultMode: 0440
            items:
              - key: username
                path: username
              - key: password
                path: password
        - name: tls-ca
          secret:
            secretName: opensearch-logs-ca
            defaultMode: 0444
            items:
              - key: ca.crt
                path: ca.crt
        - name: tmp
          emptyDir:
            sizeLimit: 16Mi
