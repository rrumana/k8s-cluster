apiVersion: v1
kind: ConfigMap
metadata:
  name: fluent-bit-config
  namespace: search
data:
  fluent-bit.conf: |
    [SERVICE]
        Flush                       1
        Daemon                      Off
        Log_Level                   warn
        Parsers_File                parsers.conf
        HTTP_Server                 On
        HTTP_Listen                 0.0.0.0
        HTTP_Port                   2020
        storage.path                /var/fluent-bit/state/storage
        storage.sync                normal
        storage.checksum            on
        storage.max_chunks_up       64
        storage.backlog.mem_limit   32M
        storage.metrics             on

    [INPUT]
        Name              tail
        Path              /var/log/containers/*.log
        Parser            cri
        Tag               kube.*
        Skip_Long_Lines   On
        Refresh_Interval  10
        Rotate_Wait       30
        DB                /var/fluent-bit/state/flb_kube.db
        DB.Sync           Normal
        storage.type      filesystem

    [FILTER]
        Name                kubernetes
        Match               kube.*
        Kube_Tag_Prefix     kube.var.log.containers.
        Merge_Log           On
        Merge_Log_Trim      On
        Keep_Log            On
        # Preserve stable pod metadata, but drop raw labels until they are
        # normalized. Dotted label keys like app.kubernetes.io/name collide
        # with plain labels such as app when indexed into OpenSearch.
        Labels              Off
        Annotations         Off

    [FILTER]
        Name        modify
        Match       kube.*
        Rename      log message
        Add         cluster k8s-cluster

    [OUTPUT]
        Name              http
        Match             kube.*
        Host              data-prepper.search.svc.cluster.local
        Port              2021
        URI               /logs
        Format            json
        Retry_Limit       False
        storage.total_limit_size  2G
