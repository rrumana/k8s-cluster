apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: fluent-bit
  namespace: search
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: fluent-bit
  endpoints:
    - port: http-metrics
      # v2 retains the existing counters and adds storage/backlog capacity
      # metrics needed to observe filesystem buffering.
      path: /api/v2/metrics/prometheus
      interval: 30s
