apiVersion: v1
kind: ConfigMap
metadata:
  name: opensearch-retention-stage2-armed-v1
  namespace: search
  annotations:
    argocd.argoproj.io/sync-wave: "5"
    storage.rcrumana.xyz/safety-property: >-
      ARMED only: each policy contains a delete action, but no transition targets
      the delete state. The 1,000-year hold back-edge prevents OpenSearch
      from disabling the policy. A later, separately gated revision is required
      to make deletion reachable.
data:
  logs-retention-60d-v1-armed.json: |
    {
      "policy": {
        "description": "Stage 2 ARMED policy for ordinary cluster logs. The delete action exists only in an unreachable state; a separately gated activation revision must add the transition that enforces 60-day retention.",
        "schema_version": 1,
        "default_state": "retained",
        "states": [
          {
            "name": "retained",
            "actions": [],
            "transitions": [
              {
                "state_name": "eligible_for_deletion",
                "conditions": {
                  "min_index_age": "60d"
                }
              }
            ]
          },
          {
            "name": "eligible_for_deletion",
            "actions": [],
            "transitions": [
              {
                "state_name": "retained",
                "conditions": {
                  "min_state_age": "365000d"
                }
              }
            ]
          },
          {
            "name": "delete",
            "actions": [
              {
                "delete": {}
              }
            ],
            "transitions": []
          }
        ],
        "ism_template": {
          "index_patterns": ["logs-*"],
          "priority": 100
        }
      }
    }
