apiVersion: batch/v1
kind: Job
metadata:
  name: opensearch-rbd-trim-0-v3
  namespace: search
  annotations:
    argocd.argoproj.io/sync-wave: "20"
  labels:
    app.kubernetes.io/name: opensearch-rbd-trim
spec:
  backoffLimit: 0
  activeDeadlineSeconds: 600
  template:
    metadata:
      labels:
        app.kubernetes.io/name: opensearch-rbd-trim
    spec:
      restartPolicy: Never
      automountServiceAccountToken: false
      imagePullSecrets:
        - name: harbor-pull-creds
      tolerations:
        - key: homelab.rcrumana.xyz/storage
          operator: Equal
          value: "true"
          effect: NoSchedule
      affinity:
        podAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  statefulset.kubernetes.io/pod-name: opensearch-logs-logs-app-replicated-0
              topologyKey: kubernetes.io/hostname
      containers:
        - name: trim
          image: harbor.rcrumana.xyz/mirror/rook/ceph:v1.19.3
          command:
            - /bin/sh
            - -ceu
            - |
              df -h /data
              fstrim -v /data
          securityContext:
            privileged: true
            runAsUser: 0
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: data-opensearch-logs-logs-app-replicated-0
---
