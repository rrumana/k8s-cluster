apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-homepage-nodes
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  homepage-node-melchior.json: |
    {
      "annotations": {
        "list": [
          {
            "builtIn": 1,
            "datasource": {
              "type": "grafana",
              "uid": "-- Grafana --"
            },
            "enable": true,
            "hide": true,
            "iconColor": "rgba(0, 211, 255, 1)",
            "name": "Annotations & Alerts",
            "type": "dashboard"
          }
        ]
      },
      "editable": true,
      "graphTooltip": 1,
      "panels": [
        {
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "palette-classic"
              },
              "custom": {
                "fillOpacity": 10,
                "showPoints": "never"
              },
              "max": 100,
              "min": 0,
              "unit": "percent"
            },
            "overrides": []
          },
          "gridPos": {
            "h": 8,
            "w": 6,
            "x": 0,
            "y": 0
          },
          "id": 1,
          "options": {
            "legend": {
              "displayMode": "hidden"
            },
            "tooltip": {
              "mode": "single"
            }
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              },
              "expr": "100 * sum(rate(node_cpu_seconds_total{instance=\"192.168.1.13:9100\",mode=~\"user|system|nice|irq|softirq|steal\"}[1m])) / count(node_cpu_seconds_total{instance=\"192.168.1.13:9100\",mode=\"idle\"})",
              "legendFormat": "CPU",
              "refId": "A"
            }
          ],
          "title": "CPU usage",
          "type": "timeseries"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "palette-classic"
              },
              "custom": {
                "fillOpacity": 10,
                "showPoints": "never"
              },
              "max": 100,
              "min": 0,
              "unit": "percent"
            },
            "overrides": []
          },
          "gridPos": {
            "h": 8,
            "w": 6,
            "x": 6,
            "y": 0
          },
          "id": 2,
          "options": {
            "legend": {
              "displayMode": "hidden"
            },
            "tooltip": {
              "mode": "single"
            }
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              },
              "expr": "100 * (1 - node_memory_MemAvailable_bytes{instance=\"192.168.1.13:9100\"} / node_memory_MemTotal_bytes{instance=\"192.168.1.13:9100\"})",
              "legendFormat": "RAM",
              "refId": "A"
            }
          ],
          "title": "RAM usage",
          "type": "timeseries"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "palette-classic"
              },
              "custom": {
                "fillOpacity": 10,
                "showPoints": "never"
              },
              "max": 2500000000,
              "min": 0,
              "unit": "bps"
            },
            "overrides": []
          },
          "gridPos": {
            "h": 8,
            "w": 6,
            "x": 12,
            "y": 0
          },
          "id": 3,
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "bottom"
            },
            "tooltip": {
              "mode": "multi"
            }
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              },
              "expr": "8 * rate(node_network_receive_bytes_total{instance=\"192.168.1.13:9100\",device=\"enp196s0\"}[1m])",
              "legendFormat": "RX",
              "refId": "A"
            },
            {
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              },
              "expr": "8 * rate(node_network_transmit_bytes_total{instance=\"192.168.1.13:9100\",device=\"enp196s0\"}[1m])",
              "legendFormat": "TX",
              "refId": "B"
            }
          ],
          "title": "Network usage enp196s0",
          "type": "timeseries"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "palette-classic"
              },
              "custom": {
                "fillOpacity": 10,
                "showPoints": "never"
              },
              "max": 2500000000,
              "min": 0,
              "unit": "bps"
            },
            "overrides": []
          },
          "gridPos": {
            "h": 8,
            "w": 6,
            "x": 18,
            "y": 0
          },
          "id": 4,
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "bottom"
            },
            "tooltip": {
              "mode": "multi"
            }
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              },
              "expr": "8 * rate(node_network_receive_bytes_total{instance=\"192.168.1.13:9100\",device=\"enp197s0\"}[1m])",
              "legendFormat": "RX",
              "refId": "A"
            },
            {
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              },
              "expr": "8 * rate(node_network_transmit_bytes_total{instance=\"192.168.1.13:9100\",device=\"enp197s0\"}[1m])",
              "legendFormat": "TX",
              "refId": "B"
            }
          ],
          "title": "Network usage enp197s0",
          "type": "timeseries"
        }
      ],
      "refresh": "1s",
      "schemaVersion": 39,
      "style": "dark",
      "tags": [
        "homepage",
        "node"
      ],
      "templating": {
        "list": []
      },
      "time": {
        "from": "now-15m",
        "to": "now"
      },
      "timezone": "browser",
      "title": "Homepage Node / Melchior",
      "uid": "homepage-node-melchior",
      "version": 1
    }
