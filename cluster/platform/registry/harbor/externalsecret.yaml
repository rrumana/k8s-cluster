apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: harbor-core-secrets
  namespace: harbor
  annotations:
    argocd.argoproj.io/sync-wave: "-20"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault
    kind: ClusterSecretStore
  target:
    name: harbor-core-secrets
    creationPolicy: Owner
  data:
    - secretKey: HARBOR_ADMIN_PASSWORD
      remoteRef:
        key: apps/harbor/core
        property: HARBOR_ADMIN_PASSWORD
    - secretKey: secretKey
      remoteRef:
        key: apps/harbor/core
        property: secretKey
