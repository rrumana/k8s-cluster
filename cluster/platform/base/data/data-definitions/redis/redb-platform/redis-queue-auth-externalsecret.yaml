apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: redis-queue-auth
  annotations:
    argocd.argoproj.io/sync-wave: "-20"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault
    kind: ClusterSecretStore
  target:
    name: redis-queue-auth
    creationPolicy: Owner
  data:
    - secretKey: password
      remoteRef:
        key: apps/media/immich-secret
        property: REDIS_PASSWORD
