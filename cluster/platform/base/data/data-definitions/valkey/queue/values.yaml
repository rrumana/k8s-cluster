global:
  imageRegistry: harbor.rcrumana.xyz/mirror
  imagePullSecrets:
    - harbor-pull-creds
  security:
    allowInsecureImages: true

fullnameOverride: valkey-queue

architecture: replication

auth:
  enabled: true
  sentinel: false
  existingSecret: valkey-queue-auth
  existingSecretPasswordKey: password

commonConfiguration: |-
  maxmemory 2gb
  maxmemory-policy noeviction
  appendonly yes
  appendfsync everysec
  save ""

sentinel:
  enabled: false

podAntiAffinityPreset: hard

networkPolicy:
  enabled: false

pdb:
  create: true
  maxUnavailable: 1

primary:
  replicaCount: 0
  persistence:
    enabled: true
    storageClass: ceph-block
    size: 20Gi
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: "2"
      memory: 2Gi

replica:
  replicaCount: 2
  # Keep replicas available for the brief, planned primary cutover. These
  # temporary probes validate each local Valkey process without requiring the
  # upstream primary to be reachable.
  customLivenessProbe:
    exec:
      command:
        - /usr/bin/bash
        - -ec
        - /health/ping_liveness_local.sh 5
    initialDelaySeconds: 20
    periodSeconds: 5
    timeoutSeconds: 6
    failureThreshold: 5
  customReadinessProbe:
    exec:
      command:
        - /usr/bin/bash
        - -ec
        - /health/ping_readiness_local.sh 1
    initialDelaySeconds: 20
    periodSeconds: 5
    timeoutSeconds: 2
    failureThreshold: 5
  persistence:
    enabled: true
    storageClass: ceph-block-app-replicated
    size: 20Gi
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: "2"
      memory: 2Gi

metrics:
  enabled: true
  serviceMonitor:
    enabled: true
