apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: valkey-data-valkey-queue-primary-0
  annotations:
    argocd.argoproj.io/sync-wave: "-30"
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: ceph-block
  resources:
    requests:
      storage: 20Gi
  volumeMode: Filesystem
