apiVersion: v1
kind: Service
metadata:
  name: valkey-queue-migration-primary
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: valkey
    app.kubernetes.io/instance: valkey-queue
    app.kubernetes.io/component: replica
    statefulset.kubernetes.io/pod-name: valkey-queue-replicas-0
  ports:
    - name: tcp-redis
      port: 6379
      targetPort: redis
      protocol: TCP
