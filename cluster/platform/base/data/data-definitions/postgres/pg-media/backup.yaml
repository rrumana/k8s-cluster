apiVersion: postgresql.cnpg.io/v1
kind: ScheduledBackup
metadata:
  name: pg-media-daily
  annotations:
    argocd.argoproj.io/sync-wave: "10"
spec:
  schedule: "0 15 3 * * *"
  # Temporary NAS-removal pause. Remove to resume scheduled base backups.
  suspend: true
  backupOwnerReference: cluster
  cluster:
    name: pg-media
  immediate: true
