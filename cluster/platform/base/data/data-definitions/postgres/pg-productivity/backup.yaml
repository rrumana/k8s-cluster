apiVersion: postgresql.cnpg.io/v1
kind: ScheduledBackup
metadata:
  name: pg-productivity-daily
  annotations:
    argocd.argoproj.io/sync-wave: "10"
spec:
  schedule: "0 45 3 * * *"
  # Safety hold while the Cluster has no object-store backup configuration.
  suspend: true
  backupOwnerReference: cluster
  cluster:
    name: pg-productivity
  immediate: true
