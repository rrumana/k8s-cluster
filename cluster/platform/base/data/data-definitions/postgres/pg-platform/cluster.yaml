apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: pg-platform
  annotations:
    argocd.argoproj.io/sync-wave: "-10"
    # Safety hold while no object-store backup configuration exists.
    cnpg.io/skipWalArchiving: "enabled"
  labels:
    app.kubernetes.io/name: pg-platform
    app.kubernetes.io/part-of: postgres
spec:
  description: "Shared PostgreSQL cluster for platform apps."

  imageName: harbor.rcrumana.xyz/mirror/cloudnative-pg/postgresql:18.1
  imagePullSecrets:
    - name: harbor-pull-creds
  instances: 3
  primaryUpdateStrategy: unsupervised
  affinity:
    enablePodAntiAffinity: true
    podAntiAffinityType: required
    topologyKey: kubernetes.io/hostname
    nodeSelector:
      homelab.rcrumana.xyz/node-plane: storage
    tolerations:
      - key: homelab.rcrumana.xyz/storage
        operator: Equal
        value: "true"
        effect: NoSchedule

  storage:
    storageClass: ceph-block-app-replicated
    size: 50Gi
    resizeInUseVolumes: false
  walStorage:
    storageClass: ceph-block-app-replicated
    size: 30Gi
    resizeInUseVolumes: false

  enableSuperuserAccess: true

  monitoring:
    enablePodMonitor: true

  postgresql:
    parameters:
      max_connections: "200"
      max_slot_wal_keep_size: "20GB"
      log_min_duration_statement: "500ms"
    synchronous:
      method: any
      number: 1
      dataDurability: preferred
