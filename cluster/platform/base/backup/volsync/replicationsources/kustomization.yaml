apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ai.yaml
  - media.yaml
  - other.yaml
  - platform.yaml
  - productivity.yaml

# Temporary NAS-removal pause. Remove this patch to resume scheduled replication.
patches:
  - target:
      group: volsync.backube
      version: v1alpha1
      kind: ReplicationSource
    patch: |-
      - op: add
        path: /spec/paused
        value: true
