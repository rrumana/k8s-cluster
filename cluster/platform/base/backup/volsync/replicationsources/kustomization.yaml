apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ai.yaml
  - media.yaml
  - other.yaml
  - platform.yaml
  - productivity.yaml

# Safety pause while no object-storage target is configured. Reconfigure the
# shared credentials before removing this patch.
patches:
  - target:
      group: volsync.backube
      version: v1alpha1
      kind: ReplicationSource
    patch: |-
      - op: add
        path: /spec/paused
        value: true
