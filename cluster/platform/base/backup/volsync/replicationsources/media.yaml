apiVersion: volsync.backube/v1alpha1
kind: ReplicationSource
metadata:
  name: arr-stack-gluetun-backup
  namespace: media
spec:
  sourcePVC: arr-stack-gluetun-critical
  trigger:
    schedule: "5 1 * * *"
  restic:
    copyMethod: Snapshot
    volumeSnapshotClassName: ceph-block-snap
    repository: arr-stack-gluetun-backup-restic
    pruneIntervalDays: 14
    moverSecurityContext:
      runAsUser: 0
      runAsGroup: 0
      fsGroup: 0
    retain:
      daily: 7
      weekly: 4
      monthly: 3
