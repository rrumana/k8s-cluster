# STAGED CUTOVER FENCE: keep suspended until Plex/Jellyfin/ARR and every known
# external NFS client are quiesced. Activate it only in a separate commit.
apiVersion: batch/v1
kind: Job
metadata:
  name: ceph-nfs-bulk-media-export-fence-v2
  namespace: rook-ceph
  annotations:
    argocd.argoproj.io/sync-wave: "10"
  labels:
    app.kubernetes.io/name: ceph-nfs-bulk
    app.kubernetes.io/component: media-export-migration
spec:
  suspend: false
  podReplacementPolicy: Failed
  backoffLimit: 0
  completions: 1
  parallelism: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ceph-nfs-bulk
        app.kubernetes.io/component: media-export-migration
    spec:
      automountServiceAccountToken: false
      restartPolicy: Never
      imagePullSecrets:
        - name: harbor-pull-creds
      securityContext:
        runAsUser: 0
        runAsGroup: 0
        runAsNonRoot: false
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: fence-export
          # Pin the digest currently running in the rook-ceph-tools pod; it
          # contains the Ceph 20.2.2 CLI, jq, bash, and coreutils used below.
          image: harbor.rcrumana.xyz/mirror/rook/ceph@sha256:afb615fc5482db55218f95950d8ce80fb386e480aff17bb7b466d6ae072ebf05
          imagePullPolicy: IfNotPresent
          command:
            - /bin/bash
            - -c
            - |
              set -Eeuo pipefail

              readonly cluster=ceph-nfs-bulk
              readonly pseudo=/media
              readonly old_fs=ceph-filesystem
              readonly old_path=/volumes/bulk/media/e51b34bd-ab57-4678-bc00-5861411d64f5

              MON_HOST="$(printf '%s' "${ROOK_CEPH_MON_ENDPOINTS}" | sed -e 's/[a-z]=//g')"
              cat > /etc/ceph/ceph.conf <<EOF
              [global]
                fsid = ${ROOK_CEPH_FSID}
                mon_host = ${MON_HOST}
              EOF
              install -m 0600 /etc/ceph-admin/keyring \
                /etc/ceph/ceph.client.admin.keyring

              # BLUESTORE_SLOW_OP_ALERT is latched for 24 hours on this
              # cluster. Permit that warning alone only when fresh topology,
              # PG-state, and latency gates all prove the cluster is ready.
              cluster_status="$(ceph status --format json)"
              if ! printf '%s\n' "${cluster_status}" | jq -e '
                  (.health.status == "HEALTH_OK" and
                    (.health.checks | length) == 0) or
                  (.health.status == "HEALTH_WARN" and
                    (.health.checks | keys) == ["BLUESTORE_SLOW_OP_ALERT"])
                ' >/dev/null; then
                echo 'Refusing NFS fence with unexpected Ceph health' >&2
                printf '%s\n' "${cluster_status}" | jq .health >&2
                exit 75
              fi
              printf '%s\n' "${cluster_status}" | jq -e '
                .osdmap.num_osds > 0 and
                .osdmap.num_osds == .osdmap.num_up_osds and
                .osdmap.num_osds == .osdmap.num_in_osds and
                .osdmap.num_remapped_pgs == 0
              ' >/dev/null
              ceph pg stat --format json | jq -e '
                .pg_ready == true and
                ([.pg_summary.num_pg_by_state[].num] | add) ==
                  .pg_summary.num_pgs and
                all(.pg_summary.num_pg_by_state[];
                  (.name | split("+") |
                    (index("active") != null and index("clean") != null)))
              ' >/dev/null
              ceph osd perf --format json | jq -e '
                .pg_ready == true and
                all(.osdstats.osd_perf_infos[];
                  .perf_stats.commit_latency_ms < 100 and
                  .perf_stats.apply_latency_ms < 100)
              ' >/dev/null

              exports="$(ceph nfs export ls "${cluster}" --format json)"
              if printf '%s\n' "${exports}" | jq -e \
                  --arg pseudo "${pseudo}" 'index($pseudo) == null' >/dev/null; then
                echo 'The /media export is already absent; the NFS fence is in place'
                exit 0
              fi

              current="$(ceph nfs export info "${cluster}" "${pseudo}" \
                --format json)"

              printf '%s\n' "${current}" | jq -e \
                --arg cluster "${cluster}" \
                --arg pseudo "${pseudo}" \
                --arg fs "${old_fs}" \
                --arg path "${old_path}" '
                  .cluster_id == $cluster and
                  .pseudo == $pseudo and
                  .path == $path and
                  .fsal.name == "CEPH" and
                  .fsal.fs_name == $fs and
                  .fsal.cmount_path == "/" and
                  .access_type == "RW" and
                  .squash == "no_root_squash" and
                  (.sectype | sort) == ["sys"] and
                  (.protocols | sort) == [3, 4] and
                  (.transports | sort) == ["TCP"] and
                  .security_label == true and
                  (.clients | length) == 0
                ' >/dev/null

              old_clients="$(ceph tell "mds.${old_fs}:0" client ls --format json)"
              source_clients="$(printf '%s\n' "${old_clients}" | jq \
                --arg root "${old_path}" '
                  [.[] | select((.client_metadata.root // "") == $root)]
                ')"
              if [[ "$(printf '%s\n' "${source_clients}" | jq length)" != 0 ]]; then
                echo 'Refusing to remove the export while direct source mounts remain:' >&2
                printf '%s\n' "${source_clients}" | jq . >&2
                exit 71
              fi

              echo 'Validated the exact legacy export; removing /media to fence NFS'
              printf '%s\n' "${current}" | jq .
              ceph nfs export rm "${cluster}" "${pseudo}"

              for _ in {1..12}; do
                exports="$(ceph nfs export ls "${cluster}" --format json)"
                if printf '%s\n' "${exports}" | jq -e \
                    --arg pseudo "${pseudo}" \
                    'index($pseudo) == null' >/dev/null; then
                  echo 'NFS /media export fenced successfully'
                  exit 0
                fi
                sleep 2
              done

              echo 'The /media export remains listed after the fence operation' >&2
              printf '%s\n' "${exports}" | jq . >&2
              ceph nfs export info "${cluster}" "${pseudo}" \
                --format json-pretty >&2 || true
              exit 72
          env:
            - name: ROOK_CEPH_MON_ENDPOINTS
              valueFrom:
                configMapKeyRef:
                  name: rook-ceph-mon-endpoints
                  key: data
            - name: ROOK_CEPH_FSID
              valueFrom:
                secretKeyRef:
                  name: rook-ceph-mon
                  key: fsid
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: "1"
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
          volumeMounts:
            - name: ceph-config
              mountPath: /etc/ceph
            - name: ceph-admin-keyring
              mountPath: /etc/ceph-admin/keyring
              subPath: keyring
              readOnly: true
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: ceph-config
          emptyDir: {}
        - name: ceph-admin-keyring
          secret:
            secretName: rook-ceph-admin-keyring
        - name: tmp
          emptyDir: {}
