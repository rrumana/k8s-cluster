apiVersion: ceph.rook.io/v1
kind: CephCluster
metadata:
  name: rook-ceph
  namespace: rook-ceph
spec:
  dataDirHostPath: /var/lib/rook

  cephVersion:
    image: harbor.rcrumana.xyz/mirror/ceph/ceph:v20.2.0

  # Keep Ceph traffic on the primary LAN during the storage-node migration.
  network:
    provider: host
    publicNetwork: "192.168.1.0/24"
    clusterNetwork: "192.168.1.0/24"

  annotations:
    all:
      homelab.rcrumana.xyz/rollout-trigger: "ceph-lan-2026-07-07"

  mon:
    count: 3
    allowMultiplePerNode: false

  mgr:
    count: 2
    allowMultiplePerNode: false
    modules:
      - name: rook
        enabled: true
      - name: nfs
        enabled: false

  dashboard:
    enabled: true
    ssl: true

  placement:
    all:
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
        - key: node-role.kubernetes.io/master
          operator: Exists
          effect: NoSchedule
        - key: homelab.rcrumana.xyz/storage
          operator: Equal
          value: "true"
          effect: NoSchedule
    mon:
      nodeAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          nodeSelectorTerms:
            - matchExpressions:
                - key: homelab.rcrumana.xyz/node-plane
                  operator: In
                  values:
                    - storage
      tolerations:
        - key: homelab.rcrumana.xyz/storage
          operator: Equal
          value: "true"
          effect: NoSchedule
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: rook-ceph-mon
    mgr:
      nodeAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          nodeSelectorTerms:
            - matchExpressions:
                - key: homelab.rcrumana.xyz/node-plane
                  operator: In
                  values:
                    - storage
      tolerations:
        - key: homelab.rcrumana.xyz/storage
          operator: Equal
          value: "true"
          effect: NoSchedule
      podAntiAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchLabels:
                app: rook-ceph-mgr
            topologyKey: kubernetes.io/hostname

  monitoring:
    enabled: true
    # Ceph v20.2.0 has a prometheus mgr startup regression that can crash the
    # module on Rook-managed clusters. Disable Ceph-exported metrics until a
    # fixed Ceph image is available, then remove this override.
    metricsDisabled: true

  # Migration recovery settings tuned for NVMe OSDs during the storage-node
  # migration. Revisit after the one-time OSD moves are complete.
  cephConfig:
    global:
      public_network: "192.168.1.0/24"
      cluster_network: "192.168.1.0/24"
      osd_mclock_override_recovery_settings: "true"
      osd_mclock_profile: high_recovery_ops
      osd_max_backfills: "6"
      osd_recovery_max_active: "6"
      osd_recovery_max_single_start: "6"
      osd_recovery_sleep: "0.1"

  storage:
    useAllNodes: false
    useAllDevices: false
    osdMaxUpdatesInParallel: 1
    # Migration step 2: old control-plane OSDs have been evacuated and will be
    # physically moved to the Eva storage nodes before being re-added here.
    nodes:
      - name: eva-1
        devices:
          - name: /dev/disk/by-id/nvme-Samsung_SSD_990_PRO_4TB_S7KGNJ0X154136L
          - name: /dev/disk/by-id/nvme-CT2000P310SSD8_252350935F8C
          - name: /dev/disk/by-id/nvme-CT2000P310SSD8_252350935FBF
      - name: eva-2
        devices:
          - name: /dev/disk/by-id/nvme-Samsung_SSD_990_PRO_4TB_S7KGNJ0X162139V
          - name: /dev/disk/by-id/nvme-Samsung_SSD_990_PRO_2TB_S7KHNJ0Y612649F
          - name: /dev/disk/by-id/nvme-Fanxiang_S880_2TB_FXS880254440074
      - name: eva-3
        devices:
          - name: /dev/disk/by-id/nvme-Samsung_SSD_990_PRO_2TB_S73WNJ0W944501L
          - name: /dev/disk/by-id/nvme-ADATA_LEGEND_900_4N42210FA46C
          - name: /dev/disk/by-id/nvme-Sabrent_Rocket_Q_23CD0705089800199528
