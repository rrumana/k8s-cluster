apiVersion: ceph.rook.io/v1
kind: CephCluster
metadata:
  name: rook-ceph
  namespace: rook-ceph
spec:
  dataDirHostPath: /var/lib/rook

  cephVersion:
    image: quay.io/ceph/ceph:v20.2.2

  # Four NVMe OSDs run on each 64 GiB Eva node. The hard limit prevents each
  # BlueStore cache from sizing itself against the entire node, while the
  # matching request reserves the full OSD memory budget for scheduling.
  resources:
    osd:
      requests:
        memory: 8Gi
      limits:
        memory: 8Gi

  # Ceph traffic stays on the primary LAN until a dedicated storage network is
  # introduced and validated.
  network:
    provider: host
    publicNetwork: "192.168.1.0/24"
    clusterNetwork: "192.168.1.0/24"

  annotations:
    all:
      homelab.rcrumana.xyz/rollout-trigger: "ceph-lan-2026-07-07"

  mon:
    count: 3
    allowMultiplePerNode: false

  mgr:
    count: 2
    allowMultiplePerNode: false
    modules:
      - name: rook
        enabled: true
      - name: nfs
        enabled: true
      - name: stats
        enabled: true

  dashboard:
    enabled: true
    ssl: true
    prometheusEndpoint: "http://kube-prometheus-stack-prometheus.monitoring.svc:9090"
    prometheusEndpointSSLVerify: false

  placement:
    all:
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
        - key: node-role.kubernetes.io/master
          operator: Exists
          effect: NoSchedule
        - key: homelab.rcrumana.xyz/storage
          operator: Equal
          value: "true"
          effect: NoSchedule
    mon:
      nodeAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          nodeSelectorTerms:
            - matchExpressions:
                - key: homelab.rcrumana.xyz/node-plane
                  operator: In
                  values:
                    - storage
      tolerations:
        - key: homelab.rcrumana.xyz/storage
          operator: Equal
          value: "true"
          effect: NoSchedule
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: rook-ceph-mon
    mgr:
      nodeAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          nodeSelectorTerms:
            - matchExpressions:
                - key: homelab.rcrumana.xyz/node-plane
                  operator: In
                  values:
                    - storage
      tolerations:
        - key: homelab.rcrumana.xyz/storage
          operator: Equal
          value: "true"
          effect: NoSchedule
      podAntiAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchLabels:
                app: rook-ceph-mgr
            topologyKey: kubernetes.io/hostname

  monitoring:
    enabled: true
    metricsDisabled: false

  # Temporary replacement recovery settings. Restore the client-priority
  # profile after the eva-3 replacement OSD is fully backfilled and clean.
  cephConfig:
    global:
      public_network: "192.168.1.0/24"
      cluster_network: "192.168.1.0/24"
      # EC optimizations require a 16 KiB stripe unit selected when the pool is
      # created. Existing pools are unaffected by this default.
      osd_pool_erasure_code_stripe_unit: "16384"
      osd_mclock_override_recovery_settings: "true"
      osd_mclock_profile: high_client_ops
      osd_max_scrubs: "8"
      osd_max_backfills: "6"
      osd_recovery_max_active: "6"
      osd_recovery_max_single_start: "6"
      osd_recovery_sleep: "0.2"
    client:
      client_readahead_max_periods: "1"
      client_readahead_max_bytes: "4194304"
      client_readahead_min: "131072"

  storage:
    useAllNodes: false
    useAllDevices: false
    osdMaxUpdatesInParallel: 1
    # Final explicit OSD inventory for the Eva storage nodes.
    nodes:
      - name: eva-1
        devices:
          - name: /dev/disk/by-id/nvme-Samsung_SSD_990_PRO_4TB_S7KGNU0Y209796X
          - name: /dev/disk/by-id/nvme-Samsung_SSD_990_PRO_4TB_S7KGNJ0X154136L
          - name: /dev/disk/by-id/nvme-CT2000P310SSD8_252350935F8C
          - name: /dev/disk/by-id/nvme-CT2000P310SSD8_252350935FBF
      - name: eva-2
        devices:
          - name: /dev/disk/by-id/nvme-Samsung_SSD_990_PRO_4TB_S7KGNU0X809381J
          - name: /dev/disk/by-id/nvme-Samsung_SSD_990_PRO_4TB_S7KGNJ0X162139V
          - name: /dev/disk/by-id/nvme-Samsung_SSD_990_PRO_2TB_S7KHNJ0Y612649F
          - name: /dev/disk/by-id/nvme-Fanxiang_S880_2TB_FXS880254440074
      - name: eva-3
        devices:
          - name: /dev/disk/by-id/nvme-Samsung_SSD_990_PRO_4TB_S7KGNU0X809383A
          - name: /dev/disk/by-id/nvme-Samsung_SSD_990_PRO_4TB_S7KGNU0Y209802J
          - name: /dev/disk/by-id/nvme-ADATA_LEGEND_900_4N42210FA46C
          - name: /dev/disk/by-id/nvme-Samsung_SSD_990_PRO_2TB_S73WNJ0W944501L
