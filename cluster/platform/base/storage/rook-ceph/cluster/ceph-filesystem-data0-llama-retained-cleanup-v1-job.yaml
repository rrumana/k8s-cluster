# One-shot cleanup for the retired Llama model-cache source. The original CSI
# PVC/PV has already been deleted with retained snapshots, leaving this exact
# snapshot-retained subvolume as the only consumer of ceph-filesystem-data0.
# Keep this versioned Job in GitOps until it completes and the pool usage falls
# to the small legacy-filesystem residual threshold; then remove the Job in a
# follow-up commit. data0 is the old filesystem's immutable default data pool,
# so the pool itself cannot be detached until that whole filesystem is retired.
apiVersion: batch/v1
kind: Job
metadata:
  name: ceph-filesystem-data0-llama-retained-cleanup-v1
  namespace: rook-ceph
  annotations:
    argocd.argoproj.io/sync-wave: "10"
  labels:
    app.kubernetes.io/name: ceph-filesystem
    app.kubernetes.io/component: retired-data-cleanup
spec:
  podReplacementPolicy: Failed
  backoffLimit: 0
  completions: 1
  parallelism: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ceph-filesystem
        app.kubernetes.io/component: retired-data-cleanup
    spec:
      automountServiceAccountToken: false
      restartPolicy: Never
      imagePullSecrets:
        - name: harbor-pull-creds
      nodeSelector:
        homelab.rcrumana.xyz/node-plane: storage
      tolerations:
        - key: homelab.rcrumana.xyz/storage
          operator: Equal
          value: "true"
          effect: NoSchedule
      securityContext:
        runAsUser: 0
        runAsGroup: 0
        runAsNonRoot: false
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: remove-retained-source
          # Pin the digest used by the reviewed Ceph migration Jobs. It
          # contains the Ceph 20.2.2 CLI, jq, bash, and coreutils.
          image: harbor.rcrumana.xyz/mirror/rook/ceph@sha256:afb615fc5482db55218f95950d8ce80fb386e480aff17bb7b466d6ae072ebf05
          imagePullPolicy: IfNotPresent
          command:
            - /bin/bash
            - -c
            - |
              set -Eeuo pipefail

              readonly old_fs=ceph-filesystem
              readonly old_group=csi
              readonly old_pool=ceph-filesystem-data0
              readonly old_subvolume=csi-vol-088b88c5-e3a9-4efd-ba2a-105e6d2a8c3e
              readonly old_snapshot=csi-snap-ab6c8947-7eb5-4e29-a887-2f7775c11d07
              readonly target_fs=cephfs
              readonly target_group=csi
              readonly target_pool=cephfs-bulk
              readonly target_subvolume=csi-vol-9470b1de-3507-4006-bafa-57ec63726084
              readonly target_path=/volumes/csi/csi-vol-9470b1de-3507-4006-bafa-57ec63726084/f5dcb94f-089d-4f10-90ed-371a9faefe3e
              readonly target_minimum_bytes=212000000000
              readonly residual_pool_threshold_bytes=2147483648

              MON_HOST="$(printf '%s' "${ROOK_CEPH_MON_ENDPOINTS}" | sed -e 's/[a-z]=//g')"
              cat > /etc/ceph/ceph.conf <<EOF
              [global]
                fsid = ${ROOK_CEPH_FSID}
                mon_host = ${MON_HOST}
              EOF
              install -m 0600 /etc/ceph-admin/keyring \
                /etc/ceph/ceph.client.admin.keyring

              # Deletion is useful when near-full is the only capacity fault,
              # so allow those alerts plus the known latched BlueStore alert.
              # Refuse every topology, availability, or PG-state fault.
              cluster_status="$(ceph status --format json)"
              if ! printf '%s\n' "${cluster_status}" | jq -e '
                  ((.health.checks | keys) - [
                    "BLUESTORE_SLOW_OP_ALERT",
                    "OSD_NEARFULL",
                    "POOL_NEARFULL"
                  ] | length) == 0 and
                  .osdmap.num_osds > 0 and
                  .osdmap.num_osds == .osdmap.num_up_osds and
                  .osdmap.num_osds == .osdmap.num_in_osds and
                  .osdmap.num_remapped_pgs == 0
                ' >/dev/null; then
                echo 'Refusing retained-source cleanup with unexpected Ceph health' >&2
                printf '%s\n' "${cluster_status}" | jq .health >&2
                exit 75
              fi
              ceph pg stat --format json | jq -e '
                .pg_ready == true and
                ([.pg_summary.num_pg_by_state[].num] | add) ==
                  .pg_summary.num_pgs and
                all(.pg_summary.num_pg_by_state[];
                  (.name | split("+") |
                    (index("active") != null and index("clean") != null)))
              ' >/dev/null

              filesystems="$(ceph fs ls --format json)"
              printf '%s\n' "${filesystems}" | jq -e \
                --arg old_fs "${old_fs}" \
                --arg old_pool "${old_pool}" \
                --arg target_fs "${target_fs}" \
                --arg target_pool "${target_pool}" '
                  any(.[];
                    .name == $old_fs and
                    (.data_pools | index($old_pool)) != null) and
                  any(.[];
                    .name == $target_fs and
                    (.data_pools | index($target_pool)) != null)
                ' >/dev/null

              pool_details="$(ceph osd pool get "${old_pool}" all --format json)"
              printf '%s\n' "${pool_details}" | jq -e \
                --arg pool "${old_pool}" '
                  .pool == $pool and .size == 3 and .min_size == 2
                ' >/dev/null

              # Prove the migrated model cache still exists in the exact final
              # EC-backed subvolume and is not an empty/recreated PVC.
              target_info="$(ceph fs subvolume info \
                "${target_fs}" "${target_subvolume}" \
                --group_name "${target_group}" --format json)"
              printf '%s\n' "${target_info}" | jq -e \
                --arg pool "${target_pool}" \
                --arg path "${target_path}" \
                --argjson minimum_bytes "${target_minimum_bytes}" '
                  .type == "subvolume" and
                  .state == "complete" and
                  .data_pool == $pool and
                  .path == $path and
                  .bytes_used >= $minimum_bytes
                ' >/dev/null

              subvolumes="$(ceph fs subvolume ls "${old_fs}" \
                --group_name "${old_group}" --format json)"
              if ! printf '%s\n' "${subvolumes}" | jq -e \
                  --arg subvolume "${old_subvolume}" '
                    ([.[].name] | sort) == [$subvolume]
                  ' >/dev/null; then
                # An empty list means a prior attempt already removed the
                # exact orphan. Anything else is a new/unexplained data0 user.
                if printf '%s\n' "${subvolumes}" | jq -e \
                    'length == 0' >/dev/null; then
                  echo 'The exact retained source is already absent'
                else
                  echo 'Refusing cleanup: unexpected data0 CSI subvolume inventory' >&2
                  printf '%s\n' "${subvolumes}" | jq . >&2
                  exit 70
                fi
              else
                source_info="$(ceph fs subvolume info \
                  "${old_fs}" "${old_subvolume}" \
                  --group_name "${old_group}" --format json)"
                printf '%s\n' "${source_info}" | jq -e '
                  .type == "subvolume" and
                  .state == "snapshot-retained"
                ' >/dev/null

                snapshots="$(ceph fs subvolume snapshot ls \
                  "${old_fs}" "${old_subvolume}" \
                  --group_name "${old_group}" --format json)"
                printf '%s\n' "${snapshots}" | jq -e \
                  --arg snapshot "${old_snapshot}" '
                    ([.[].name] | sort) == [$snapshot]
                  ' >/dev/null

                snapshot_info="$(ceph fs subvolume snapshot info \
                  "${old_fs}" "${old_subvolume}" "${old_snapshot}" \
                  --group_name "${old_group}" --format json)"
                printf '%s\n' "${snapshot_info}" | jq -e \
                  --arg pool "${old_pool}" '
                    .created_at == "2026-03-16 22:06:28.412009" and
                    .data_pool == $pool and
                    .has_pending_clones == "no"
                  ' >/dev/null

                old_clients="$(ceph tell "mds.${old_fs}:0" client ls \
                  --format json)"
                source_clients="$(printf '%s\n' "${old_clients}" | jq \
                  --arg subvolume "${old_subvolume}" '
                    [.[] | select(
                      (.client_metadata.root // "") | contains($subvolume)
                    )]
                  ')"
                if [[ "$(printf '%s\n' "${source_clients}" | jq length)" != 0 ]]; then
                  echo 'Refusing cleanup while the retained source is mounted:' >&2
                  printf '%s\n' "${source_clients}" | jq . >&2
                  exit 71
                fi

                echo 'Validated the exact retired Llama source; removing its last retained snapshot'
                ceph fs subvolume snapshot rm \
                  "${old_fs}" "${old_subvolume}" "${old_snapshot}" \
                  --group_name "${old_group}"
              fi

              # Removing the last snapshot of a snapshot-retained subvolume
              # removes the subvolume and asynchronously purges its objects.
              for attempt in $(seq 1 720); do
                remaining="$(ceph fs subvolume ls "${old_fs}" \
                  --group_name "${old_group}" --format json)"
                if printf '%s\n' "${remaining}" | jq -e \
                    --arg subvolume "${old_subvolume}" '
                      all(.[]; .name != $subvolume)
                    ' >/dev/null; then
                  stored_bytes="$(ceph df detail --format json | jq -r \
                    --arg pool "${old_pool}" \
                    '.pools[] | select(.name == $pool) | .stats.stored')"
                  if [[ -n "${stored_bytes}" ]] &&
                      (( stored_bytes <= residual_pool_threshold_bytes )); then
                    echo "Retired data0 source purged; pool stores ${stored_bytes} bytes"
                    exit 0
                  fi
                  echo "Waiting for asynchronous data0 purge: ${stored_bytes:-unknown} bytes remain"
                else
                  echo 'Waiting for the snapshot-retained subvolume to disappear'
                fi
                sleep 10
              done

              echo 'Timed out waiting for the retired data0 objects to be purged' >&2
              ceph fs subvolume ls "${old_fs}" \
                --group_name "${old_group}" --format json-pretty >&2
              ceph df detail --format json | jq \
                --arg pool "${old_pool}" \
                '.pools[] | select(.name == $pool)' >&2
              exit 74
          env:
            - name: ROOK_CEPH_MON_ENDPOINTS
              valueFrom:
                configMapKeyRef:
                  name: rook-ceph-mon-endpoints
                  key: data
            - name: ROOK_CEPH_FSID
              valueFrom:
                secretKeyRef:
                  name: rook-ceph-mon
                  key: fsid
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: "1"
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
          volumeMounts:
            - name: ceph-config
              mountPath: /etc/ceph
            - name: ceph-admin-keyring
              mountPath: /etc/ceph-admin/keyring
              subPath: keyring
              readOnly: true
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: ceph-config
          emptyDir: {}
        - name: ceph-admin-keyring
          secret:
            secretName: rook-ceph-admin-keyring
        - name: tmp
          emptyDir: {}
