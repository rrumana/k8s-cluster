apiVersion: v1
kind: Service
metadata:
  name: ceph-nfs-bulk
  namespace: rook-ceph
  annotations:
    metallb.io/address-pool: default-pool
spec:
  type: LoadBalancer
  loadBalancerIP: 192.168.1.236
  externalTrafficPolicy: Local
  selector:
    app: rook-ceph-nfs
    ceph_nfs: ceph-nfs-bulk
  ports:
    - name: nfs
      port: 2049
      protocol: TCP
      targetPort: 2049
