apiVersion: v1
kind: ServiceAccount
metadata:
  name: vault-legacy-storage-cleanup
  labels:
    app.kubernetes.io/name: vault
    app.kubernetes.io/component: legacy-storage-cleanup
    app.kubernetes.io/managed-by: argocd
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: vault-legacy-storage-cleanup
  labels:
    app.kubernetes.io/name: vault
    app.kubernetes.io/component: legacy-storage-cleanup
    app.kubernetes.io/managed-by: argocd
rules:
  - apiGroups:
      - ""
    resources:
      - pods
    verbs:
      - list
  - apiGroups:
      - ""
    resources:
      - persistentvolumeclaims
    resourceNames:
      - data-vault-0
      - data-vault-1
      - data-vault-2
      - data-vault-app-replicated-0
      - data-vault-app-replicated-1
      - data-vault-app-replicated-2
    verbs:
      - get
  - apiGroups:
      - ""
    resources:
      - persistentvolumeclaims
    resourceNames:
      - data-vault-0
      - data-vault-1
      - data-vault-2
    verbs:
      - delete
  - apiGroups:
      - apps
    resources:
      - statefulsets
    resourceNames:
      - vault
      - vault-app-replicated
    verbs:
      - get
  - apiGroups:
      - apps
    resources:
      - statefulsets
    resourceNames:
      - vault
    verbs:
      - delete
  - apiGroups:
      - ""
    resources:
      - services
    resourceNames:
      - vault-internal
    verbs:
      - get
      - delete
  - apiGroups:
      - ""
    resources:
      - configmaps
    resourceNames:
      - vault-config
    verbs:
      - get
      - delete
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: vault-legacy-storage-cleanup
  labels:
    app.kubernetes.io/name: vault
    app.kubernetes.io/component: legacy-storage-cleanup
    app.kubernetes.io/managed-by: argocd
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: vault-legacy-storage-cleanup
subjects:
  - kind: ServiceAccount
    name: vault-legacy-storage-cleanup
    namespace: security
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: vault-legacy-storage-cleanup
  labels:
    app.kubernetes.io/name: vault
    app.kubernetes.io/component: legacy-storage-cleanup
    app.kubernetes.io/managed-by: argocd
rules:
  - apiGroups:
      - ""
    resources:
      - persistentvolumes
    resourceNames:
      - pvc-f31558b2-cdfc-4aea-ab5c-bcb9feec0483
      - pvc-7073640e-1c4f-4f21-9dd0-1aadd17aace3
      - pvc-a6065555-583c-4878-96a7-98d97f65806b
    verbs:
      - get
  - apiGroups:
      - storage.k8s.io
    resources:
      - volumeattachments
    verbs:
      - list
  - apiGroups:
      - snapshot.storage.k8s.io
    resources:
      - volumesnapshots
      - volumesnapshotcontents
    verbs:
      - list
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: vault-legacy-storage-cleanup
  labels:
    app.kubernetes.io/name: vault
    app.kubernetes.io/component: legacy-storage-cleanup
    app.kubernetes.io/managed-by: argocd
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: vault-legacy-storage-cleanup
subjects:
  - kind: ServiceAccount
    name: vault-legacy-storage-cleanup
    namespace: security
