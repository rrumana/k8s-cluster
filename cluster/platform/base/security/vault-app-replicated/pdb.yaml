apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: vault-app-replicated
  labels:
    app.kubernetes.io/name: vault
    app.kubernetes.io/instance: vault
    app.kubernetes.io/component: server-migration
    app.kubernetes.io/managed-by: argocd
    vault.rcrumana.xyz/generation: app-replicated
spec:
  maxUnavailable: 1
  # Keep the safe default explicit and force the PDB controller to recompute
  # status after the final one-at-a-time target pod recreation.
  unhealthyPodEvictionPolicy: IfHealthyBudget
  selector:
    matchLabels:
      app.kubernetes.io/name: vault
      vault.rcrumana.xyz/generation: app-replicated
