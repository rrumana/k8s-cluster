apiVersion: v1
kind: ConfigMap
metadata:
  name: renovate-config
  annotations:
    argocd.argoproj.io/sync-wave: "-10"
data:
  config.js: |
    module.exports = {
      platform: 'github',
      endpoint: 'https://api.github.com/',
      repositories: ['rrumana/k8s-cluster'],
      onboarding: false,
      requireConfig: 'required',
      dependencyDashboard: true,
      hostRules: [
        {
          matchHost: 'harbor.rcrumana.xyz',
          hostType: 'docker',
          username: process.env.HARBOR_USERNAME,
          password: process.env.HARBOR_PASSWORD,
        },
      ],
      packageRules: [
        // Harbor proxy-cache lists tags by fetching the full upstream GHCR tag set
        // before paginating, which times out on repos with very large tag histories.
        {
          matchDatasources: ['docker'],
          matchPackageNames: ['harbor.rcrumana.xyz/proxy-ghcr/**'],
          overridePackageName: "{{replace 'harbor.rcrumana.xyz/proxy-ghcr/' 'ghcr.io/' packageName}}",
          registryUrls: ['https://ghcr.io'],
        },
      ],
    };
