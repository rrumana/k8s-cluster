# Draft only. This Application is intentionally not listed in
# cluster/platform/gitops/argocd/apps/kustomization.yaml.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: storage-lab
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "20"
spec:
  project: default
  source:
    repoURL: https://github.com/rrumana/k8s-homelab-2.git
    targetRevision: main
    path: cluster/platform/base/storage/storage-lab
  destination:
    server: https://kubernetes.default.svc
    namespace: storage-lab
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
