# platform/scheduling/metrics-server/values.yaml

replicas: 1

image:
  repository: harbor.rcrumana.xyz/mirror/metrics-server/metrics-server
  tag: v0.8.0

imagePullSecrets:
  - name: harbor-pull-creds

# Homelab nodes often use kubelet certs without complete SANs.
# This keeps metrics available for VPA recommendation ingestion.
args:
  - --kubelet-insecure-tls
  - --kubelet-preferred-address-types=InternalIP,Hostname,InternalDNS,ExternalDNS,ExternalIP

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 250m
    memory: 256Mi
